      * 使用者點超連結開啟郵件軟體後,可回來 Excel 複製此欄貼入信件

  V8 (2026-04-19)  新增稽核與稽核扣薪兩欄
    - 員工 sheet 新增「稽核」「稽核扣薪」兩欄(紅字)
    - 標準工時:一般員工 8hr;工時類型含「業務」者 7hr(公司補貼 1hr 通勤)
    - 業務類型若整天請假,仍須滿 8hr 標準(通勤補貼只給有來上班的日)
    - 當日實際時數 = 打卡時段(扣午休) + 所有請假時數 + 當日加班補休時數
    - 加班時數不算入當日工時(加班是額外的)
    - 稽核時數 = max(0, 標準 − 實際),扣薪 = 稽核時數 × 時薪
    - 漏打卡日不計稽核(已由漏打卡扣薪處理)
    - 新增 parseAllLeavesFromNote 解析同一備註多段 [xxx]

    - 只缺上班卡或只缺下班卡(一張有一張無)時,上下班時間欄文字改紅字粗體
    - 便於快速辨識打卡不完整的日子(例如只打了上班但忘記打下班)
    - 兩張都缺的情況維持原本灰字(通常是整天請假或排休)

  V6 (2026-04-19)  漏打卡視覺標示
    - 缺上/下班卡且備註為空的日子,上班時間與下班時間格底色改淡黃色
    - 讓漏打卡日一眼可辨識

  V5 (2026-04-19)  總表 sheet 間互連
    - 薪資總表的員工姓名做成超連結,點擊跳到該員工 sheet
    - 員工 sheet 右上角新增「← 返回總表」連結
    - 雙向導覽,方便快速切換

  V4 (2026-04-19)  薪資計算基準統一(勞基法標準)
    - 日薪固定為 月薪 / 30(不論月份天數、應出勤天數)
    - 時薪固定為 日薪 / 8 = 月薪 / 240
    - 所有扣薪(事假、普傷、漏打卡)統一以「時薪 × 時數」為基準
    - 事假 1 天(8hr × 時薪) = 漏打卡 1 天(1 × 日薪) 金額完全相同
    - 應出勤天數設定不再影響日薪,僅作為漏打卡天數判斷用

  V3 (2026-04-19)  漏打卡判斷邏輯修正
    - 有備註(請假、加班、忘打卡等)但未完整打卡的天,不再算漏打卡
    - 公式:漏打卡 = 應出勤 − 完整打卡天 − 有備註未完整打卡天
    - 避免像「3/14 生理假」、「3/28 加班補休+特休假」這類情況被誤扣

  V2 (2026-04-19)  版本規則調整
    - 版本號格式改為 V + 單一數字(V1, V2, V3...)
    - 每次輸出檔案都會進版

  V1 (2026-04-19)  首版完整功能
    - 上傳人資系統打卡 Excel,自動解析員工資料
    - 支援月薪範本下載/匯入、個別員工月薪調整
    - 工時類型自動對應(預設 / 楊梅-週一至週五 / 楊梅-排休(新) / 門市-排休 / 門市業務)
    - 排休制 vs 週休制員工差異計算
    - 漏打卡規則:
        * 排休制:應出勤 = 本月總天數 − 8
        * 週休制:應出勤 = 本月非六日天數
        * 漏打卡天數 = 應出勤 − 完整打卡天,扣日薪
    - 假別扣薪:事假全扣、普通傷病假半扣
    - 加班 / 加班補休採時數紀錄,不影響薪資
    - 匯出 Excel:薪資總表 + 每位員工獨立 sheet
    - 員工 sheet 含逐日打卡、備註、請假時數、扣薪、合計公式

    padding: 16px 20px 60px 20px;   /* 底部留空避免被 sticky tabs 蓋到 */
  }

  .tbl-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 18px;

  .tbl-summary-meta {

  .xls-table {

    border-spacing: 0;

  .xls-table th, .xls-table td {

  /* thead 表頭 sticky top */

  /* 左上角(表頭的姓名欄)要 top + left 同時 sticky,z 最高 */

  /* 首欄有輕微右側陰影,暗示凍結 */

  .xls-table tbody td.editable {

  .xls-table tbody td.num { text-align: right; }
  .xls-table tbody td.link {

  .xls-table tbody td.neg { color: #d43f3a; }

  /* 頁籤列(Excel 樣式,sticky 固定在視窗底部)*/
  .tbl-tabs {

    bottom: 0;

  /* View Mode Toggle */

<input type="file" id="salaryFileInput" accept=".xlsx,.xls" style="display:none">

<script>
// =============== 版本資訊 ===============
const APP_VERSION = 'V57';
const APP_BUILD_DATE = '2026-04-19';

// =============== State ===============
const state = {
  rawData: null,
  fileName: '',
  period: '',
  employees: {},
  selectedEmp: null,
  defaultSalary: 30000,
  defaultWorkDays: 22,
  recordSort: 'asc', // 'asc' = 日期升冪(預設), 'desc' = 降冪
  salaryImportOrder: [], // 月薪匯入時的員工順序(影響薪資匯出的排序)
  viewMode: 'cards', // 'cards' = 現有卡片模式、'table' = Excel 式表格模式
  activeTab: 'summary', // 表格模式下的當前頁籤:'summary' | 'salary' | 員工名
  overrides: {}, // 表格模式下使用者的編輯覆蓋值(key: "員工名|欄位名") → 新值
};

// =============== SVG icons ===============
const ICONS = {
  download: '<svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
  sheet: '<svg class="icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>',
  close: '<svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
  check: '<svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>',
  edit: '<svg class="icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',
  chevron: '<svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>',
  alert: '<svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
};

// =============== Utility ===============
function showToast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.className = 'toast ' + type;
  el.textContent = msg;
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 7000);
}

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// =============== Parse uploaded Excel ===============
async function parseFile(file) {
  document.getElementById('uploadError').classList.add('hidden');
  document.getElementById('dropMain').textContent = '解析中...';
  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array', cellDates: true });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, raw: false, dateNF: 'yyyy-mm-dd hh:mm' });

    let headerRow = -1;
    for (let i = 0; i < Math.min(rows.length, 15); i++) {
      if (rows[i] && rows[i].some(c => c === '員工姓名')) { headerRow = i; break; }
    }
    if (headerRow === -1) throw new Error('找不到表頭列,請確認檔案格式');

    const header = rows[headerRow];
    const col = {
      name: header.indexOf('員工姓名'),
      workType: header.indexOf('工時名稱'),
      date: header.indexOf('上班日期'),
      punchIn: header.indexOf('上班打卡時間'),
      punchOut: header.indexOf('下班打卡時間'),
      note: header.indexOf('說明'),
    };
    if (col.name === -1) throw new Error('找不到"員工姓名"欄位');

    const records = [];
    const dates = new Set();

    // 統一把任意型別的日期/時間值轉成字串
    // 可能來源:Date 物件、Excel serial number、"2026-03-17"、"2026-03-17 08:30"、"3/17/26" 等
    const toDateStr = (v) => {
      if (!v) return '';
      if (v instanceof Date) {
        const y = v.getFullYear();
        const m = String(v.getMonth() + 1).padStart(2, '0');
        const d = String(v.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
      }
      if (typeof v === 'number') {
        // Excel date serial (天數 from 1899-12-30)
        const d = new Date(Math.round((v - 25569) * 86400000));
        if (isNaN(d)) return '';
        const y = d.getUTCFullYear();
        const mo = String(d.getUTCMonth() + 1).padStart(2, '0');
        const da = String(d.getUTCDate()).padStart(2, '0');
        return `${y}-${mo}-${da}`;
      }
      if (typeof v === 'string') {
        // 可能是 "2026-03-17 08:30" 或 "3/17/26" 等
        const ymd = v.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
        if (ymd) return `${ymd[1]}-${String(ymd[2]).padStart(2,'0')}-${String(ymd[3]).padStart(2,'0')}`;
        const mdy = v.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
        if (mdy) {
          let [_, m, d, y] = mdy;
          if (y.length === 2) y = '20' + y;
          return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        }
        return v.split(' ')[0];
      }
      return '';
    };
    // 統一把打卡時間值轉成 "HH:MM" 字串,無效回空字串
    const toTimeStr = (v) => {
      if (!v) return '';
      if (v instanceof Date) {
        return `${String(v.getHours()).padStart(2,'0')}:${String(v.getMinutes()).padStart(2,'0')}`;
      }
      if (typeof v === 'number') {
        const d = new Date(Math.round((v - 25569) * 86400000));
        if (isNaN(d)) return '';
        return `${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}`;
      }
      if (typeof v === 'string') {
        // 形式可能是 "2026-03-17 08:30" 或 "08:30" 或 "3/17/26 8:30"
        const hm = v.match(/(\d{1,2}):(\d{2})/);
        if (hm) return `${String(hm[1]).padStart(2,'0')}:${hm[2]}`;
        return '';
      }
      return '';
    };

    for (let i = headerRow + 1; i < rows.length; i++) {
      const r = rows[i];
      if (!r || !r[col.name]) continue;
      const dateStr = toDateStr(r[col.date]);
      const rec = {
        name: String(r[col.name]).trim(),
        workType: r[col.workType] || '',
        date: dateStr,                       // 統一 'yyyy-mm-dd'
        punchIn: toTimeStr(r[col.punchIn]),  // 統一 'HH:MM' 或 ''
        punchOut: toTimeStr(r[col.punchOut]),
        note: r[col.note] || '',
      };
      records.push(rec);
      if (dateStr) dates.add(dateStr);
    }

    const dateArr = [...dates].sort();
    let periodStr = '';
    if (dateArr.length > 0) {
      const first = dateArr[0], last = dateArr[dateArr.length - 1];
      periodStr = first === last ? first : `${first} ~ ${last}`;
      if (first.slice(0, 7) === last.slice(0, 7)) {
        const [y, m] = first.split('-');
        periodStr = `${y}年${parseInt(m)}月`;
      }
    }

    const empMap = {};
    for (const r of records) {
      if (!empMap[r.name]) empMap[r.name] = { name: r.name, workType: r.workType, records: [] };
      empMap[r.name].records.push(r);
    }
    for (const name in empMap) {
      empMap[name].stats = calcStats(empMap[name].records, empMap[name].workType);
    }

    state.rawData = records;
    state.period = periodStr;
    state.employees = empMap;
    state.fileName = file.name;
    state.defaultSalary = Number(document.getElementById('defaultSalary').value) || 30000;
    state.defaultWorkDays = Number(document.getElementById('defaultWorkDays').value) || 22;

    render();
  } catch (e) {
    document.getElementById('dropMain').textContent = '點擊或拖曳檔案至此處';
    const err = document.getElementById('uploadError');
    err.innerHTML = ICONS.alert + ' 解析失敗:' + esc(e.message);
    err.classList.remove('hidden');
  }
}

// =============== Stats computation ===============
function calcStats(records, workTypeName) {
  const rule = getWorkTypeRule(workTypeName);
  const punchedDates = getPunchedDates(records);

  // 計算本月日期範圍(records 中所有日期的 min / max),避免跨月請假把上月時數算入本月
  let minDate = '', maxDate = '';
  for (const r of records) {
    if (r.date) {
      if (!minDate || r.date < minDate) minDate = r.date;
      if (!maxDate || r.date > maxDate) maxDate = r.date;
    }
  }
  const monthRange = minDate ? { minDate, maxDate } : null;

  const s = {
    totalDays: records.length, punchedDays: 0, missedPunch: 0, lateNote: 0,
    daysWithNote: 0,  // 有備註(未完整打卡)的天數 — 這些不算漏打卡
    overtime: [], overtimeComp: [], otHours: 0, leaveHours: {},
    leaves: { 事假:[], 特休假:[], 普通傷病假:[], 生理假:[], 公假:[], 婚假:[], 喪假:[] },
    rule,
  };

  const seenLeaveRanges = new Set();
  const seenOtRanges = new Set();

  for (const r of records) {
    const hasIn = r.punchIn && r.punchIn !== '';
    const hasOut = r.punchOut && r.punchOut !== '';
    const hasNote = !!(r.note && r.note.trim());
    if (hasIn && hasOut) {
      s.punchedDays++;
    } else {
      // 未完整打卡
      if (hasNote) s.daysWithNote++;   // 但有備註 → 正當缺席,不算漏打卡
      else s.missedPunch++;              // 既沒打卡又沒備註 → 疑似漏打卡
    }
    if (!r.note) continue;
    if (!r.note.startsWith('[') && r.note.includes('忘')) s.lateNote++;
    const m = r.note.match(/\[([^\]]+)\](.+)/);
    if (!m) continue;
    const type = m[1], rest = m[2];
    const descKey = `${type}|${rest.trim()}`;

    if (type === '加班') {
      if (seenOtRanges.has(descKey)) continue;
      seenOtRanges.add(descKey);
      const hours = parseHours(rest, rule, punchedDates, monthRange);
      s.overtime.push({ date: r.date, desc: rest.trim(), hours });
      s.otHours += hours;
    } else if (type === '加班補休') {
      if (seenOtRanges.has(descKey)) continue;
      seenOtRanges.add(descKey);
      const hours = parseHours(rest, rule, punchedDates, monthRange);
      s.overtimeComp.push({ date: r.date, desc: rest.trim(), hours });
    } else {
      if (seenLeaveRanges.has(descKey)) continue;
      seenLeaveRanges.add(descKey);
      const hours = parseHours(rest, rule, punchedDates, monthRange);
      const key = type.startsWith('喪假') ? '喪假' : type;
      if (!s.leaves[key]) s.leaves[key] = [];
      s.leaves[key].push({ date: r.date, desc: rest.trim(), hours });
      s.leaveHours[key] = (s.leaveHours[key] || 0) + hours;
    }
  }
  return s;
}

// =============== 工時類型規則 ===============
// 依工時類型推斷上班時段與排休規則
// isShift = true 代表排休制(月休8天,休息日看打卡記錄),false 代表週休制(週六日休)
// 各工時類型的標準時段(含午休 / 用餐時段)
// lunchStart / lunchEnd 用 decimal hour 表示(例如 12.5 = 12:30)
// 所有類型「一天上班時數」都是 8hr,工作時段 = (第一時段) + (第二時段) = 4 + 4
const WORK_TYPES = {
  '預設':             { startH: 8,  startM: 30, endH: 17, endM: 30, isShift: false, lunchStart: 12.5, lunchEnd: 13.5 },
  '楊梅-週一至週五':   { startH: 8,  startM: 30, endH: 17, endM: 30, isShift: false, lunchStart: 12.5, lunchEnd: 13.5 },
  '楊梅-排休(新)':    { startH: 8,  startM: 30, endH: 17, endM: 30, isShift: true,  lunchStart: 12.5, lunchEnd: 13.5 },
  '楊梅-排休(舊)':    { startH: 8,  startM: 30, endH: 17, endM: 30, isShift: true,  lunchStart: 12.5, lunchEnd: 13.5 },
  '門市-排休':         { startH: 9,  startM: 0,  endH: 18, endM: 0,  isShift: true,  lunchStart: 13.0, lunchEnd: 14.0 },
  '門市-週一至週五':   { startH: 9,  startM: 0,  endH: 18, endM: 0,  isShift: false, lunchStart: 13.0, lunchEnd: 14.0 },
  '門市業務':          { startH: 10, startM: 30, endH: 19, endM: 30, isShift: true,  lunchStart: 14.5, lunchEnd: 15.5 },
};
// 預設 fallback(遇到未登錄的工時類型)
const DEFAULT_WORK_TYPE = { startH: 8, startM: 30, endH: 17, endM: 30, isShift: false, lunchStart: 12.5, lunchEnd: 13.5 };

function getWorkTypeRule(workTypeName) {
  return WORK_TYPES[workTypeName] || DEFAULT_WORK_TYPE;
}

// 從員工打卡記錄中,抓出「有打卡的日期集合」→ 推斷排休制員工的實際工作日
function getPunchedDates(records) {
  const set = new Set();
  for (const r of records) {
    const hasIn = r.punchIn && r.punchIn !== '';
    const hasOut = r.punchOut && r.punchOut !== '';
    if (hasIn || hasOut) {
      if (r.date) set.add(r.date);
    }
  }
  return set;
}

function isWeekday(d) {
  const w = d.getDay();
  return w >= 1 && w <= 5;
}

function formatDateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// 判斷某日期是否為該員工的「工作日」
// - 週休制:週一至週五 = 工作日
// - 排休制:該日有打卡記錄 = 工作日(沒打卡 = 休息日)
function isWorkingDay(date, rule, punchedDates) {
  if (rule.isShift) {
    return punchedDates.has(formatDateKey(date));
  }
  return isWeekday(date);
}

// 計算請假/加班區間的「實際工時」
// - 單日:用時間差,扣午休(若跨午休 12:30~13:30 且總長 >= 5 小時)
// - 跨日:逐日累加工作日,依員工工時類型的上班時段為基準
function parseHours(text, rule, punchedDates, monthRange) {
  rule = rule || DEFAULT_WORK_TYPE;
  punchedDates = punchedDates || new Set();
  // monthRange = { minDate, maxDate }(YYYY-MM-DD),超出範圍的日期不計入(跨月請假只算本月)

  const parts = text.split('~');
  if (parts.length !== 2) return 0;

  const pt = (s) => {
    const dm = s.match(/(\d{4})-(\d{2})-(\d{2})/);
    const tm = s.match(/(\d{1,2}):(\d{2})/);
    if (!tm) return null;
    return {
      dateStr: dm ? `${dm[1]}-${dm[2]}-${dm[3]}` : null,
      h: parseInt(tm[1]), m: parseInt(tm[2])
    };
  };
  const a = pt(parts[0]), b = pt(parts[1]);
  if (!a || !b) return 0;

  const aDateStr = a.dateStr || '2000-01-01';
  const bDateStr = b.dateStr || aDateStr;

  // 單日:直接算時間差(請假/加班補休時段不扣午休,與 calcDayLeaveFromNote 一致)
  if (aDateStr === bDateStr) {
    if (monthRange && (aDateStr < monthRange.minDate || aDateStr > monthRange.maxDate)) return 0;
    return calcLeaveHoursRange(a.h, a.m, b.h, b.m, rule);
  }

  // 跨日:逐日累加工作日
  const startDate = new Date(`${aDateStr}T00:00:00`);
  const endDate = new Date(`${bDateStr}T00:00:00`);
  if (endDate < startDate) return 0;

  let total = 0;
  const cursor = new Date(startDate);
  while (cursor <= endDate) {
    const cursorStr = formatDateKey(cursor);
    const inMonth = !monthRange || (cursorStr >= monthRange.minDate && cursorStr <= monthRange.maxDate);
    if (inMonth && isWorkingDay(cursor, rule, punchedDates)) {
      const isFirst = cursor.getTime() === startDate.getTime();
      const isLast = cursor.getTime() === endDate.getTime();
      if (isFirst) {
        total += calcLeaveHoursRange(a.h, a.m, rule.endH, rule.endM, rule);
      } else if (isLast) {
        total += calcLeaveHoursRange(rule.startH, rule.startM, b.h, b.m, rule);
      } else {
        total += calcLeaveHoursRange(rule.startH, rule.startM, rule.endH, rule.endM, rule);
      }
    }
    cursor.setDate(cursor.getDate() + 1);
  }
  return Math.round(total * 100) / 100;
}

// 單日內某時段的工時 — 用於「實際打卡時段」
// - 若時段跨越該工時類型的午休時段,且總長 >= 5 小時 → 扣 1 小時午休
// - 每日上限 8 小時
// - rule 提供 lunchStart / lunchEnd(decimal hours),若不提供則用預設 12.5/13.5
function calcSingleDayHours(h1, m1, h2, m2, rule) {
  const start = h1 + m1 / 60;
  const end = h2 + m2 / 60;
  if (end <= start) return 0;
  let diff = end - start;
  const lunchStart = (rule && rule.lunchStart !== undefined) ? rule.lunchStart : 12.5;
  const lunchEnd = (rule && rule.lunchEnd !== undefined) ? rule.lunchEnd : 13.5;
  if (start <= lunchStart && end >= lunchEnd && diff >= 5) diff -= 1;
  if (diff > 8) diff = 8;
  return Math.round(diff * 100) / 100;
}

// 請假/加班補休的時數計算
// - 若時段跨越該工時類型的用餐時段 → 扣 1 小時午休(V57 規則變更)
// - 上限 8 小時(整天請假封頂)
// - rule 提供 lunchStart / lunchEnd(decimal hours),若不提供則用預設 12.5/13.5
function calcLeaveHoursRange(h1, m1, h2, m2, rule) {
  const start = h1 + m1 / 60;
  const end = h2 + m2 / 60;
  if (end <= start) return 0;
  let diff = end - start;
  const lunchStart = (rule && rule.lunchStart !== undefined) ? rule.lunchStart : 12.5;
  const lunchEnd = (rule && rule.lunchEnd !== undefined) ? rule.lunchEnd : 13.5;
  // V57:請假時段若涵蓋用餐時段 → 扣 1hr(與實際工時邏輯一致)
  if (start <= lunchStart && end >= lunchEnd) diff -= 1;
  if (diff > 8) diff = 8;
  if (diff < 0) diff = 0;
  return Math.round(diff * 100) / 100;
}

// 推算當月總天數與平日天數
function getMonthInfo() {
  for (const name in state.employees) {
    for (const r of state.employees[name].records) {
      if (r.date) {
        const [y, m] = r.date.split('-').map(Number);
        const totalDays = new Date(y, m, 0).getDate();
        let weekdays = 0;
        for (let d = 1; d <= totalDays; d++) {
          const w = new Date(y, m - 1, d).getDay();
          if (w !== 0 && w !== 6) weekdays++;
        }
        return { totalDays, weekdays };
      }
    }
  }
  return { totalDays: 30, weekdays: 22 };
}

function calcSalary(name) {
  const emp = state.employees[name];
  if (!emp) return null;
  const monthly = emp.salary ?? state.defaultSalary;
  const wd = emp.workDays ?? state.defaultWorkDays;  // 保留應出勤天數設定(顯示用,不再影響日薪)

  // 統一算薪基準(勞基法標準):
  // 日薪 = 月薪 / 30
  // 時薪 = 日薪 / 8 = 月薪 / 240
  const dailyWage = monthly / 30;
  const hourlyWage = dailyWage / 8;

  const personalHrs = emp.stats.leaveHours['事假'] || 0;
  const sickHrs = emp.stats.leaveHours['普通傷病假'] || 0;
  const mensHrs = emp.stats.leaveHours['生理假'] || 0;

  // 扣薪統一用時薪 × 時數
  const personalDeduct = Math.round(personalHrs * hourlyWage);                    // 事假全扣
  // 普通傷病假、生理假皆半扣(時薪 × 時數 × 0.5)
  const sickDeduct = Math.round((sickHrs + mensHrs) * hourlyWage * 0.5);

  // 漏打卡計算:
  // - 排休制(含「排休」):應出勤 = 本月總天數 − 8
  // - 週休制(預設 / 含「週休」 / 楊梅-週一至週五):應出勤 = 本月非六日天數
  // 漏打卡天數 = max(0, 應出勤 − 完整打卡天數 − 有備註未完整打卡天數)
  const isShift = emp.stats.rule.isShift;
  const { totalDays: monthTotalDays, weekdays: monthWeekdays } = getMonthInfo();
  const expectedWorkDays = isShift ? (monthTotalDays - 8) : monthWeekdays;
  const fullPunchDays = emp.stats.punchedDays;
  const excusedDays = emp.stats.daysWithNote;
  const missedDays = Math.max(0, expectedWorkDays - fullPunchDays - excusedDays);
  // 漏打卡扣薪 = 漏打卡天數 × 日薪(= 8 × 時薪,與事假 1 天完全等價)
  const missedDeduct = Math.round(missedDays * dailyWage);

  // ===== 稽核計算(全月累加) =====
  // 每日比對「實際時數」vs「標準工時」,不足則計稽核
  // 規則同員工 sheet:
  //   - 只缺一張卡、漏打卡日、排休日加班(只有[加班])、< 0.5hr 不足 → 不計
  //   - 業務類型整天請假 → 標準 8hr,其餘業務日 → 標準 7hr
  //   - 其他類型一律 8hr
  const isSalesRole = (emp.workType || '').includes('業務');
  let auditHours = 0;
  let auditDeduct = 0;
  for (const r of emp.records) {
    if (!r) continue;
    const hasIn = !!r.punchIn;
    const hasOut = !!r.punchOut;
    const hasNote = !!(r.note && r.note.trim());

    // 漏打卡日(缺卡+無備註)不計
    if ((!hasIn || !hasOut) && !hasNote) continue;
    // 只缺一張卡(XOR)不計
    if (hasIn !== hasOut) continue;

    // 排休日加班:無打卡 + 只有 [加班] 備註
    const hasPunch = hasIn || hasOut;
    const segments = parseAllLeavesFromNote(r, emp.stats.rule);
    const hasOnlyOvertime = segments.length > 0 && segments.every(s => s.type === '加班');
    if (!hasPunch && hasOnlyOvertime) continue;

    // 楊梅類週末判斷(移到算完工時後處理)
    const isYangMei = (emp.workType || '').includes('楊梅-週一至週五')
                  || (emp.workType || '').includes('楊梅-排休');
    let isYangMeiWeekend = false;
    if (isYangMei && r.date) {
      const [y, m, d] = r.date.split('-').map(Number);
      const wd = new Date(y, m - 1, d).getDay();
      isYangMeiWeekend = (wd === 0 || wd === 6);
    }

    const { actualHours, isFullDayLeave } = calcDayActualHours(r, emp.stats.rule);
    let rawShortfall = 0;

    if (isFullDayLeave) {
      // 整天請假:比對 8hr 標準
      rawShortfall = Math.max(0, 8 - actualHours);
    } else if (hasPunch) {
      // 有打卡日 — V29 規則
      const rule = emp.stats.rule;
      const stdIn = rule.startH + rule.startM / 60;
      const stdOut = rule.endH + rule.endM / 60;

      const [ih, im] = r.punchIn.split(':').map(Number);
      const [oh, om] = r.punchOut.split(':').map(Number);
      const rawIn = ih + im / 60;
      const rawOut = oh + om / 60;

      const paidCover = segments
        .filter(s => s.type !== '加班')
        .reduce((sum, s) => sum + s.hours, 0);

      // 實際工時(扣午休 if 跨)
      let workHours = Math.max(0, rawOut - rawIn);
      if (rawIn <= (rule.lunchStart ?? 12.5) && rawOut >= (rule.lunchEnd ?? 13.5) && workHours >= 5) workHours -= 1;
      workHours += paidCover;

      if (isYangMeiWeekend) {
        // 楊梅週末:工時 > 5 豁免、≤ 5 用 8 − 工時
        if (workHours > 5) {
          rawShortfall = 0;
        } else {
          rawShortfall = Math.max(0, 8 - workHours);
        }
      } else if (workHours > 7) {
        rawShortfall = 0;
      } else if (isSalesRole && workHours <= 6) {
        // 業務且工時 ≤ 6hr → 直接用 8 − 工時
        // 注意:workHours 已包含 paidCover,所以 8-workHours 就是實際不足
        rawShortfall = Math.max(0, 8 - workHours);
      } else {
        // 業務工時 > 6(目標 18:30)或非業務 → 用遲到+早退
        const outTarget = (isSalesRole && workHours > 6) ? (stdOut - 1) : stdOut;
        const late = Math.max(0, rawIn - (stdIn + 0.25));
        const earlyOut = Math.max(0, outTarget - rawOut);
        rawShortfall = late + earlyOut;
        rawShortfall = Math.max(0, rawShortfall - paidCover);
      }
    }
    rawShortfall = Math.min(rawShortfall, 8);

    const shortfall = Math.round(rawShortfall * 2) / 2;
    if (shortfall >= 0.5) {
      auditHours += shortfall;
      auditDeduct += shortfall * hourlyWage;
    }
  }
  auditHours = Math.round(auditHours * 100) / 100;
  auditDeduct = Math.round(auditDeduct);

  // V53:月薪設定的三扣 + 四加
  const deductLabor = Number(emp.deductLabor) || 0;
  const deductHealth = Number(emp.deductHealth) || 0;
  const deductFamily = Number(emp.deductFamily) || 0;
  const bonusUnusedLeave = Number(emp.bonusUnusedLeave) || 0;
  const bonusMakeupWage = Number(emp.bonusMakeupWage) || 0;
  const bonusPositionAllowance = Number(emp.bonusPositionAllowance) || 0;
  const bonusOther = Number(emp.bonusOther) || 0;
  const extraDeduct = deductLabor + deductHealth + deductFamily;
  const extraBonus = bonusUnusedLeave + bonusMakeupWage + bonusPositionAllowance + bonusOther;

  const totalDeduct = personalDeduct + sickDeduct + missedDeduct + auditDeduct + extraDeduct;
  const finalSalary = monthly + extraBonus - totalDeduct;

  return {
    monthly, workDays: wd,
    dailyWage: Math.round(dailyWage), hourlyWage: Math.round(hourlyWage),
    personalHrs, sickHrs, personalDeduct, sickDeduct,
    isShift, monthTotalDays, monthWeekdays, expectedWorkDays,
    missedDays, missedDeduct,
    auditHours, auditDeduct,
    // V53 新增
    deductLabor, deductHealth, deductFamily, extraDeduct,
    bonusUnusedLeave, bonusMakeupWage, bonusPositionAllowance, bonusOther, extraBonus,
    totalDeduct, finalSalary,
    otHours: emp.stats.otHours,
    otCompHours: emp.stats.overtimeComp.reduce((s, x) => s + x.hours, 0),
  };
}

// =============== Email 通知 ===============
// V47 通知信格式:簡潔、每行獨立、只列異常日(避免郵件軟體非等寬字體顯示錯亂)
// 格式:
//   標頭 · 工時類型 · 時段 · 制度
//   期間
//
//   === 本月統計 ===
//   本月總天數 / 非六日天數
//   出勤 / 應出勤 / 漏打卡
//   加班 / 加班補休
//   事假扣款 / 傷病假扣款
//
//   === 需留意之日期 ===
//   只列出「有異常的日子」:請假、稽核、漏打卡
//   每一日一行,含:日期、週、事件、當日打卡時間(如適用)
//
//   如有疑問請聯繫人資。
function buildEmailBody(name) {
  const emp = state.employees[name];
  if (!emp) return '';
  const rule = emp.stats.rule;
  const sal = calcSalary(name);
  const weekdayZh = ['日','一','二','三','四','五','六'];

  const startTime = `${String(rule.startH).padStart(2,'0')}:${String(rule.startM).padStart(2,'0')}`;
  const endTime = `${String(rule.endH).padStart(2,'0')}:${String(rule.endM).padStart(2,'0')}`;

  const lines = [];
  lines.push(`${emp.name} · ${emp.workType || '—'} · ${startTime}–${endTime} · ${rule.isShift ? '排休制' : '週休制'}`);
  lines.push(`期間:${state.period}`);
  lines.push('');

  // === 本月統計 ===
  lines.push('=== 本月統計 ===');
  lines.push(`本月總天數:${sal.monthTotalDays} | 非六日天數:${sal.monthWeekdays}`);
  const expectDesc = sal.isShift
    ? `應出勤:${sal.expectedWorkDays}天(本月${sal.monthTotalDays}天-月休8天)`
    : `應出勤:${sal.expectedWorkDays}天`;
  lines.push(`出勤天數:${emp.stats.punchedDays} | ${expectDesc} | 漏打卡:${sal.missedDays}天`);
  lines.push(`加班:${sal.otHours}hr | 加班補休:${sal.otCompHours}hr`);
  lines.push(`事假扣款:${sal.personalDeduct ? '-' + sal.personalDeduct.toLocaleString() : '0'} | 傷病假扣款:${sal.sickDeduct ? '-' + sal.sickDeduct.toLocaleString() : '0'}`);
  lines.push('');

  // === 準備資料 ===
  const allDates = new Set();
  for (const r of emp.records) if (r.date) allDates.add(r.date);
  const sortedDates = [...allDates].sort();
  const recordMap = {};
  for (const r of emp.records) if (r.date) recordMap[r.date] = r;

  const isSalesRole = (emp.workType || '').includes('業務');
  const isYangMei = (emp.workType || '').includes('楊梅-週一至週五')
                 || (emp.workType || '').includes('楊梅-排休');

  const hourlyWage = sal.hourlyWage;

  // 一日一項 (sortKey + text)
  const attention = [];

  for (const dateStr of sortedDates) {
    const r = recordMap[dateStr];
    const [y, m, d] = dateStr.split('-').map(Number);
    const dow = new Date(y, m - 1, d).getDay();
    const wLabel = weekdayZh[dow];
    const isWeekend = (dow === 0 || dow === 6);

    const hasIn = !!(r && r.punchIn);
    const hasOut = !!(r && r.punchOut);
    const hasNote = !!(r && r.note && r.note.trim());
    const noteText = hasNote ? r.note.trim() : '';

    // 漏打卡
    if ((!hasIn || !hasOut) && !hasNote) {
      if (rule.isShift || !isWeekend) {
        let tag = '';
        if (!hasIn && !hasOut) tag = '漏打卡(上下班卡皆未打)';
        else if (hasIn && !hasOut) tag = `漏打卡(未打下班卡,上班 ${r.punchIn})`;
        else tag = `漏打卡(未打上班卡,下班 ${r.punchOut})`;
        attention.push({ key: dateStr + '-0', text: `${dateStr} (${wLabel}) ${tag}` });
      }
    }

    // 請假日(有備註、非加班類型)
    if (hasNote) {
      const mm = noteText.match(/^\[([^\]]+)\](.+)$/);
      if (mm) {
        const type = mm[1];
        if (!['加班', '加班補休'].includes(type)) {
          // 計算當日請假時數與扣薪
          const parsed = calcDayLeaveFromNote(r, rule);
          let segInfo = '';
          if (parsed && parsed.hours > 0) {
            let ded = 0;
            if (type === '事假') ded = Math.round(parsed.hours * hourlyWage);
            else if (type === '普通傷病假' || type === '生理假') ded = Math.round(parsed.hours * hourlyWage * 0.5);
            // 嘗試從 desc 取時段(例如 14:30 ~ 17:30)
            const timeMatch = mm[2].match(/(\d{1,2}:\d{2})\s*~\s*(\d{1,2}:\d{2})/);
            const timeStr = timeMatch ? `(${timeMatch[1]}~${timeMatch[2]})` : '';
            segInfo = `${type} ${parsed.hours}hr${ded > 0 ? ` · 扣 -${ded.toLocaleString()}` : ''} ${timeStr}`.trim();
          } else {
            segInfo = type;
          }
          attention.push({ key: dateStr + '-1', text: `${dateStr} (${wLabel}) ${segInfo}` });
        }
      }
    }

    // 稽核
    if (hasIn && hasOut) {
      const [ih, im] = r.punchIn.split(':').map(Number);
      const [oh, om] = r.punchOut.split(':').map(Number);
      const rawIn = ih + im / 60;
      const rawOut = oh + om / 60;
      let workHours = Math.max(0, rawOut - rawIn);
      if (rawIn <= (rule.lunchStart ?? 12.5) && rawOut >= (rule.lunchEnd ?? 13.5) && workHours >= 5) workHours -= 1;
      const segments = parseAllLeavesFromNote(r, rule);
      const paidCover = segments.filter(s => s.type !== '加班').reduce((sum, s) => sum + s.hours, 0);
      workHours += paidCover;

      let shortfall = 0;
      if (isYangMei && isWeekend) {
        if (workHours <= 5) shortfall = Math.max(0, 8 - workHours);
      } else if (workHours > 7) {
        shortfall = 0;
      } else if (isSalesRole && workHours <= 6) {
        // 業務且工時 ≤ 6hr → 8 − 工時(workHours 已含 paidCover)
        shortfall = Math.max(0, 8 - workHours);
      } else {
        const stdIn = rule.startH + rule.startM / 60;
        const stdOut = rule.endH + rule.endM / 60;
        const outTarget = (isSalesRole && workHours > 6) ? (stdOut - 1) : stdOut;
        const late = Math.max(0, rawIn - (stdIn + 0.25));
        const earlyOut = Math.max(0, outTarget - rawOut);
        shortfall = Math.max(0, late + earlyOut - paidCover);
      }
      shortfall = Math.min(shortfall, 8);
      shortfall = Math.round(shortfall * 2) / 2;
      if (shortfall >= 0.5) {
        const ded = Math.round(shortfall * hourlyWage);
        attention.push({ key: dateStr + '-2',
          text: `${dateStr} (${wLabel}) 稽核 ${shortfall}hr · 扣 -${ded.toLocaleString()}(上班 ${r.punchIn} · 下班 ${r.punchOut})` });
      }
    }
  }

  // === 需留意之日期 ===
  attention.sort((a, b) => a.key < b.key ? -1 : 1);
  lines.push('=== 需留意之日期 ===');
  if (attention.length === 0) {
    lines.push('本月無異常');
  } else {
    for (const item of attention) lines.push(item.text);
  }
  lines.push('');
  lines.push('如有疑問請聯繫人資。');

  return lines.join('\n');
}

// 針對單一員工開啟 mailto 郵件撰寫(網頁使用)
function notifyEmployee(name) {
  const emp = state.employees[name];
  if (!emp) return;
  const email = (emp.email || '').trim();
  if (!email) {
    showToast(`✗ ${name} 沒有 email,無法通知`, 'error');
    return;
  }
  const subject = `【小日子寫真館】${state.period || ''} 出勤明細 - ${name}`;
  const body = buildEmailBody(name);
  const mailto = `mailto:${encodeURIComponent(email)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  window.location.href = mailto;
}


// 統一通知所有有 email 的員工(依序開啟 mailto)
async function notifyAllEmployees() {
  const withEmail = [];
  const noEmail = [];
  // 以 salaryImportOrder 或所有員工
  const order = state.salaryImportOrder && state.salaryImportOrder.length
    ? state.salaryImportOrder
    : Object.keys(state.employees).sort((a,b) => a.localeCompare(b, 'zh-Hant'));
  for (const name of order) {
    const emp = state.employees[name];
    if (!emp) continue;
    if ((emp.email || '').trim()) withEmail.push(name);
    else noEmail.push(name);
  }
  if (!withEmail.length) {
    showToast('✗ 沒有任何員工有 email', 'error');
    return;
  }
  const confirmMsg = `即將為 ${withEmail.length} 位員工開啟郵件撰寫視窗:\n${withEmail.join('、')}\n\n` +
    (noEmail.length ? `(跳過 ${noEmail.length} 位沒 email 的員工:${noEmail.join('、')})\n\n` : '') +
    `你的瀏覽器會一次開啟多個郵件視窗,是否繼續?`;
  if (!confirm(confirmMsg)) return;

  // 依序觸發,間隔 800ms 避免瀏覽器擋 pop-up
  for (let i = 0; i < withEmail.length; i++) {
    const name = withEmail[i];
    const emp = state.employees[name];
    const subject = `【小日子寫真館】${state.period || ''} 出勤明細 - ${name}`;
    const body = buildEmailBody(name);
    const mailto = `mailto:${encodeURIComponent(emp.email.trim())}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    // 用新視窗觸發,避免 location.href 覆蓋前一個
    const w = window.open(mailto, '_blank');
    if (w) setTimeout(() => { try { w.close(); } catch(e){} }, 1500);
    await new Promise(res => setTimeout(res, 800));
  }
  showToast(`✓ 已觸發 ${withEmail.length} 封通知信`, 'success');
}

function downloadTemplate() {
  // 欄位順序:姓名 | Email | 週/排休 | 應出勤 | 月薪 | 扣款三項 | 加給四項
  const rows = [[
    '員工姓名', 'Email(可選填)', '週/排休', '應出勤天數(可選填)', '月薪(TWD)',
    '(-)勞保', '(-)健保', '(-)家眷',
    '(+)未休獎金', '(+)調休工資', '(+)職務津貼', '(+)其他'
  ]];
  const names = Object.keys(state.employees).sort((a,b) => a.localeCompare(b, 'zh-Hant'));
  for (const n of names) {
    const emp = state.employees[n];
    const isShift = (emp.stats && emp.stats.rule && emp.stats.rule.isShift);
    rows.push([
      n,
      emp.email ?? '',
      isShift ? '排' : '週',
      emp.workDays ?? '',
      emp.salary ?? '',
      emp.deductLabor ?? '',
      emp.deductHealth ?? '',
      emp.deductFamily ?? '',
      emp.bonusUnusedLeave ?? '',
      emp.bonusMakeupWage ?? '',
      emp.bonusPositionAllowance ?? '',
      emp.bonusOther ?? '',
    ]);
  }
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [
    {wch:12}, {wch:24}, {wch:8}, {wch:14}, {wch:12},
    {wch:10}, {wch:10}, {wch:10},
    {wch:12}, {wch:12}, {wch:12}, {wch:10},
