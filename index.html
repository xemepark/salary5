  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '員工月薪設定');
  XLSX.writeFile(wb, `員工月薪範本_${state.period || ''}.xlsx`);
}

async function importSalary(file) {
  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
    let headerRow = -1;
    for (let i = 0; i < Math.min(rows.length, 10); i++) {
      if (rows[i] && rows[i].some(c => typeof c === 'string' && c.includes('員工姓名'))) { headerRow = i; break; }
    }
    if (headerRow === -1) throw new Error('找不到表頭("員工姓名"欄位)');
    const header = rows[headerRow].map(h => typeof h === 'string' ? h : '');
    const nameIdx = header.findIndex(h => h.includes('員工姓名'));
    const salaryIdx = header.findIndex(h => h.includes('月薪') || h.includes('薪資'));
    const daysIdx = header.findIndex(h => h.includes('出勤天數') || h.includes('應出勤'));
    const emailIdx = header.findIndex(h => /email/i.test(h) || h.includes('信箱') || h.includes('郵件'));
    // 新增欄位(V53):扣款三項、加給四項
    const laborIdx = header.findIndex(h => h.includes('勞保'));
    const healthIdx = header.findIndex(h => h.includes('健保'));
    const familyIdx = header.findIndex(h => h.includes('家眷'));
    const unusedIdx = header.findIndex(h => h.includes('未休'));
    const makeupIdx = header.findIndex(h => h.includes('調休'));
    const positionIdx = header.findIndex(h => h.includes('職務') || h.includes('津貼'));
    const otherIdx = header.findIndex(h => h.includes('其他'));
    if (nameIdx === -1 || salaryIdx === -1) throw new Error('必須有"員工姓名"與"月薪"欄位');

    // 輔助:讀取數值欄(空值或非數字視為 0)
    const readNum = (row, idx) => {
      if (idx === -1) return undefined;
      const v = row[idx];
      if (v === null || v === undefined || v === '') return undefined;
      const n = Number(v);
      return isNaN(n) ? undefined : n;
    };

    let updated = 0, skipped = 0;
    const notFound = [];
    const importOrder = [];  // 記錄本次匯入的員工順序
    for (let i = headerRow + 1; i < rows.length; i++) {
      const r = rows[i];
      if (!r || !r[nameIdx]) continue;
      const name = String(r[nameIdx]).trim();
      const sal = r[salaryIdx];
      if (sal === null || sal === undefined || sal === '') { skipped++; continue; }
      const salNum = Number(sal);
      if (isNaN(salNum)) { skipped++; continue; }
      if (!state.employees[name]) { notFound.push(name); continue; }
      const emp = state.employees[name];
      emp.salary = salNum;
      if (daysIdx !== -1 && r[daysIdx] !== null && r[daysIdx] !== undefined && r[daysIdx] !== '') {
        const d = Number(r[daysIdx]);
        if (!isNaN(d)) emp.workDays = d;
      }
      if (emailIdx !== -1 && r[emailIdx] !== null && r[emailIdx] !== undefined) {
        const em = String(r[emailIdx]).trim();
        emp.email = em || '';
      }
      // 新增:扣款三項 + 加給四項(空值視為 undefined,計算時當 0 處理)
      const labor = readNum(r, laborIdx);       if (labor !== undefined) emp.deductLabor = labor;
      const health = readNum(r, healthIdx);     if (health !== undefined) emp.deductHealth = health;
      const family = readNum(r, familyIdx);     if (family !== undefined) emp.deductFamily = family;
      const unused = readNum(r, unusedIdx);     if (unused !== undefined) emp.bonusUnusedLeave = unused;
      const makeup = readNum(r, makeupIdx);     if (makeup !== undefined) emp.bonusMakeupWage = makeup;
      const position = readNum(r, positionIdx); if (position !== undefined) emp.bonusPositionAllowance = position;
      const other = readNum(r, otherIdx);       if (other !== undefined) emp.bonusOther = other;

      if (!importOrder.includes(name)) importOrder.push(name);
      updated++;
    }
    // 儲存匯入順序,影響薪資匯出時的員工排序
    state.salaryImportOrder = importOrder;
    let msg = `✓ 已匯入 ${updated} 位員工的月薪`;
    if (skipped > 0) msg += ` · 跳過 ${skipped} 筆(金額未填)`;
    if (notFound.length > 0) msg += ` · 找不到對應員工:${notFound.join('、')}`;
    showToast(msg, notFound.length > 0 ? 'error' : 'success');
    render();
  } catch (e) {
    showToast('✗ 匯入失敗:' + e.message, 'error');
  }
}

// 把一筆 record 的說明解析成「當日」的請假/加班時數
// 若 note 是跨日請假,只算當天被涵蓋的部分
function calcDayLeaveFromNote(record, rule) {
  if (!record.note || !record.note.startsWith('[')) {
    return { type: null, hours: 0, desc: record.note || '' };
  }
  const m = record.note.match(/\[([^\]]+)\](.+)/);
  if (!m) return { type: null, hours: 0, desc: record.note };
  const type = m[1];
  const rest = m[2];

  // 抓該筆 record 當天的日期(已統一為 yyyy-mm-dd)
  const dateStr = record.date || '';
  if (!dateStr) return { type, hours: 0, desc: rest.trim() };

  // 解析區間起訖
  const parts = rest.split('~');
  if (parts.length !== 2) return { type, hours: 0, desc: rest.trim() };
  const pt = (s) => {
    const dm = s.match(/(\d{4})-(\d{2})-(\d{2})/);
    const tm = s.match(/(\d{1,2}):(\d{2})/);
    if (!tm) return null;
    return {
      dateStr: dm ? `${dm[1]}-${dm[2]}-${dm[3]}` : null,
      h: parseInt(tm[1]), m: parseInt(tm[2])
    };
  };
  const a = pt(parts[0]), b = pt(parts[1]);
  if (!a || !b) return { type, hours: 0, desc: rest.trim() };

  const aDateStr = a.dateStr || dateStr;
  const bDateStr = b.dateStr || aDateStr;

  let hours = 0;
  if (aDateStr === bDateStr) {
    // 單日:僅在該日期匹配時才計算。請假時數不扣午休、上限 8hr
    if (dateStr === aDateStr) hours = calcLeaveHoursRange(a.h, a.m, b.h, b.m, rule);
  } else {
    // 跨日:依該筆記錄的日期決定要算的時段
    if (dateStr === aDateStr) {
      // 起始日
      hours = calcLeaveHoursRange(a.h, a.m, rule.endH, rule.endM, rule);
    } else if (dateStr === bDateStr) {
      // 結束日
      hours = calcLeaveHoursRange(rule.startH, rule.startM, b.h, b.m, rule);
    } else if (dateStr > aDateStr && dateStr < bDateStr) {
      // 中間整天:用工時類型標準時段
      hours = calcLeaveHoursRange(rule.startH, rule.startM, rule.endH, rule.endM, rule);
    }
  }
  return { type, hours, desc: rest.trim() };
}

// 解析同一備註裡的「所有」[xxx]...段落
// 用於徐沛淇 3/28 那種 "[加班補休]...|[加班補休]...|[特休假]..." 的情況
// 回傳 [{type, hours, desc}, ...]
function parseAllLeavesFromNote(record, rule) {
  if (!record.note || !record.note.includes('[')) return [];
  const result = [];
  // 用正則抓出所有 [類型]日期/時間... 段落
  // 每段從 [ 開始,直到下一個 [ 或字串結尾
  const regex = /\[([^\]]+)\]([^\[]*)/g;
  let match;
  while ((match = regex.exec(record.note)) !== null) {
    const type = match[1];
    const rest = match[2].trim();
    // 清掉開頭的標點符號(逗號、頓號、|、空格等)
    const cleanRest = rest.replace(/^[,,、|\s]+/, '').replace(/[,,、|\s]+$/, '');
    if (!cleanRest) continue;
    // 用原 calcDayLeaveFromNote 邏輯算單段時數
    const mock = { date: record.date, note: `[${type}]${cleanRest}` };
    const parsed = calcDayLeaveFromNote(mock, rule);
    if (parsed.type) {
      result.push({ type: parsed.type, hours: parsed.hours, desc: parsed.desc });
    }
  }
  return result;
}

// 計算某筆記錄當日的「實際時數」(用於稽核)
// 包含:打卡時段(扣午休)+ 請假時數 + 加班補休時數
// 不含:加班時數(加班是額外不能補正常工時)
function calcDayActualHours(record, rule) {
  if (!record) return { actualHours: 0, isFullDayLeave: false };

  let hours = 0;
  let isFullDayLeave = false;  // 是否整天請假(當天沒打卡、但有請假備註)

  // 1. 打卡時段
  if (record.punchIn && record.punchOut) {
    const [h1, m1] = record.punchIn.split(':').map(Number);
    const [h2, m2] = record.punchOut.split(':').map(Number);
    hours += calcSingleDayHours(h1, m1, h2, m2, rule);
  }

  // 2. 解析所有請假 / 加班補休段落
  const segments = parseAllLeavesFromNote(record, rule);
  let leaveTotal = 0;
  let otCompTotal = 0;
  let hasLeave = false;
  for (const seg of segments) {
    if (seg.type === '加班') continue;  // 加班不算入當日時數
    if (seg.type === '加班補休') {
      otCompTotal += seg.hours;
    } else {
      leaveTotal += seg.hours;
      hasLeave = true;
    }
  }

  hours += leaveTotal + otCompTotal;

  // 判斷是否「整天請假」:沒打卡 + 有任何請假備註
  // (員工根本沒來,不能享有業務類型的通勤補貼 1hr)
  // 例如 3/30 [生理假] 10:30~18:30 雖請假只有 7hr(跨午休),但員工當天沒來
  // 仍視為整天請假 → 標準 8hr,實際 7hr → 稽核 1hr
  const hasPunch = !!(record.punchIn || record.punchOut);
  if (!hasPunch && hasLeave) {
    isFullDayLeave = true;
  }

  return { actualHours: Math.round(hours * 100) / 100, isFullDayLeave };
}

// 匯出薪資總表 + 每位員工一個 sheet
async function exportReport() {
  const wb = new ExcelJS.Workbook();
  wb.creator = '員工考勤薪資系統';
  wb.created = new Date();

  // 員工排序規則:
  //   1. 有在「月薪匯入檔」中的員工 → 按匯入順序
  //   2. 未在匯入檔中的員工 → 按姓名筆劃升冪(localeCompare zh-Hant)
  const importOrder = state.salaryImportOrder || [];
  const allNames = Object.keys(state.employees);
  const inImport = importOrder.filter(n => state.employees[n]);
  const rest = allNames
    .filter(n => !importOrder.includes(n))
    .sort((a, b) => a.localeCompare(b, 'zh-Hant'));
  const names = [...inImport, ...rest];

  // ========== 建立該月完整日期序列,並計算平日/週末天數 ==========
  const allDates = new Set();
  for (const n of names) {
    for (const r of state.employees[n].records) {
      if (r.date) allDates.add(r.date);
    }
  }
  const datesArr = [...allDates].sort();
  let sortedDates = datesArr;
  let weekdayCount = 0;  // 本月平日(週一至週五)
  let weekendCount = 0;  // 本月週六日
  if (datesArr.length > 0) {
    const [yy, mm] = datesArr[0].split('-').map(Number);
    const lastDay = new Date(yy, mm, 0).getDate();
    sortedDates = [];
    for (let d = 1; d <= lastDay; d++) {
      sortedDates.push(`${yy}-${String(mm).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
      const w = new Date(yy, mm - 1, d).getDay();
      if (w === 0 || w === 6) weekendCount++;
      else weekdayCount++;
    }
  }
  const totalDaysInMonth = sortedDates.length;

  // ========== Sheet 1: 薪資總表 ==========
  const summary = wb.addWorksheet('薪資總表', { views: [{ state: 'frozen', xSplit: 1, ySplit: 3 }] });

  // 第 1 行:標題
  summary.mergeCells('A1:U1');
  summary.getCell('A1').value = `薪資統計總表 · ${state.period}`;
  summary.getCell('A1').font = { bold: true, size: 14 };
  summary.getCell('A1').alignment = { vertical: 'middle', horizontal: 'left' };
  summary.getRow(1).height = 24;

  // 第 2 行:本月摘要(紅字)
  summary.mergeCells('A2:U2');
  summary.getCell('A2').value = `本月總天數:${totalDaysInMonth}  |  非六日天數(平日):${weekdayCount}  |  六日天數:${weekendCount}  |  員工總數:${names.length}`;
  summary.getCell('A2').font = { size: 12, color: { argb: 'FFD43F3A' }, bold: true };
  summary.getCell('A2').alignment = { vertical: 'middle', horizontal: 'left' };
  summary.getRow(2).height = 22;

  // 第 3 行:欄位表頭(V54 新增「簽呈校正」欄,位在稽核扣款與實發薪資之間)
  const summaryHeaders = [
    { name: '員工姓名', width: 12 },
    { name: '工時類型', width: 18 },
    { name: '出勤天數', width: 10 },
    { name: '應出勤', width: 10 },
    { name: '漏打卡天數', width: 12 },
    { name: '事假時數', width: 10 },
    { name: '普通傷病假時數', width: 14 },
    { name: '特休假時數', width: 12 },
    { name: '生理假時數', width: 12 },
    { name: '公假時數', width: 10 },
    { name: '婚假時數', width: 10 },
    { name: '喪假時數', width: 10 },
    { name: '加班時數', width: 10 },
    { name: '加班補休時數', width: 14 },
    { name: '稽核時數', width: 10 },
    { name: '月薪', width: 10 },             // P 欄
    { name: '(-)勞保', width: 10 },           // Q
    { name: '(-)健保', width: 10 },           // R
    { name: '(-)家眷', width: 10 },           // S
    { name: '(+)未休獎金', width: 12 },        // T
    { name: '(+)調休工資', width: 12 },        // U
    { name: '(+)職務津貼', width: 12 },        // V
    { name: '(+)其他', width: 10 },            // W
    { name: '漏打卡扣款', width: 12 },         // X
    { name: '事假扣款', width: 12 },           // Y
    { name: '傷病假扣款', width: 12 },         // Z
    { name: '稽核扣款', width: 12 },           // AA
    { name: '簽呈校正', width: 12 },           // AB — V54 新增
    { name: '實發薪資', width: 12 },           // AC = SUM(P:AB)
  ];
  summaryHeaders.forEach((h, idx) => {
    summary.getColumn(idx + 1).width = h.width;
  });
  const headerRow = summary.getRow(3);
  summaryHeaders.forEach((h, idx) => {
    headerRow.getCell(idx + 1).value = h.name;
  });
  headerRow.font = { bold: true, color: { argb: 'FFFFFFFF' }, size: 11 };
  headerRow.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1A1A1A' } };
  headerRow.alignment = { horizontal: 'center', vertical: 'middle' };
  headerRow.height = 24;

  // 從第 4 行起填員工資料
  let summaryRowIdx = 4;
  for (const n of names) {
    const emp = state.employees[n];
    const sal = calcSalary(n);
    const values = [
      emp.name,                                            // 1 員工姓名 (A)
      emp.workType || '',                                  // 2 工時類型 (B)
      emp.stats.punchedDays,                               // 3 出勤天數 (C)
      sal.expectedWorkDays,                                // 4 應出勤 (D)
      sal.missedDays,                                      // 5 漏打卡天數 (E)
      emp.stats.leaveHours['事假'] || 0,                   // 6 (F)
      emp.stats.leaveHours['普通傷病假'] || 0,             // 7 (G)
      emp.stats.leaveHours['特休假'] || 0,                 // 8 (H)
      emp.stats.leaveHours['生理假'] || 0,                 // 9 (I)
      emp.stats.leaveHours['公假'] || 0,                   // 10 (J)
      emp.stats.leaveHours['婚假'] || 0,                   // 11 (K)
      emp.stats.leaveHours['喪假'] || 0,                   // 12 (L)
      sal.otHours,                                         // 13 加班時數 (M)
      sal.otCompHours,                                     // 14 加班補休時數 (N)
      sal.auditHours,                                      // 15 稽核時數 (O)
      sal.monthly,                                         // 16 月薪 (P)
      sal.deductLabor ? -sal.deductLabor : 0,              // 17 (-)勞保 (Q)
      sal.deductHealth ? -sal.deductHealth : 0,            // 18 (-)健保 (R)
      sal.deductFamily ? -sal.deductFamily : 0,            // 19 (-)家眷 (S)
      sal.bonusUnusedLeave || 0,                           // 20 (+)未休獎金 (T)
      sal.bonusMakeupWage || 0,                            // 21 (+)調休工資 (U)
      sal.bonusPositionAllowance || 0,                     // 22 (+)職務津貼 (V)
      sal.bonusOther || 0,                                 // 23 (+)其他 (W)
      sal.missedDeduct ? -sal.missedDeduct : 0,            // 24 漏打卡扣款 (X)
      sal.personalDeduct ? -sal.personalDeduct : 0,        // 25 事假扣款 (Y)
      sal.sickDeduct ? -sal.sickDeduct : 0,                // 26 傷病假扣款 (Z)
      sal.auditDeduct ? -sal.auditDeduct : 0,              // 27 稽核扣款 (AA)
      0,                                                   // 28 簽呈校正 (AB)— 預留空白
      // 29 實發薪資 (AC)留給公式下方填入
    ];
    const row = summary.getRow(summaryRowIdx);
    values.forEach((v, idx) => row.getCell(idx + 1).value = v);
    row.alignment = { vertical: 'middle' };

    // 第 29 欄(AC):實發薪資 — Excel 公式 SUM(P..:AB..)
    // P = 16, AB = 28(當前列)
    const formulaCell = row.getCell(29);
    formulaCell.value = { formula: `SUM(P${summaryRowIdx}:AB${summaryRowIdx})` };
    formulaCell.numFmt = '#,##0';

    // 員工姓名變成超連結,點擊跳到該員工的 sheet
    const sheetName = emp.name.substring(0, 28);
    const nameCell = row.getCell(1);
    nameCell.value = {
      text: emp.name,
      hyperlink: `#'${sheetName.replace(/'/g, "''")}'!A1`,
      tooltip: `點擊前往 ${emp.name} 的出勤明細`,
    };
    nameCell.font = { color: { argb: 'FF1E5FBF' }, underline: true };

    // 紅字處理(V54 欄位重新編號)
    const red = { color: { argb: 'FFD43F3A' }, bold: true };
    const blue = { color: { argb: 'FF1E5FBF' }, bold: true };
    if (sal.missedDays > 0) row.getCell(5).font = red;       // 漏打卡天數
    if (sal.auditHours > 0) row.getCell(15).font = red;      // 稽核時數
    // 扣款欄紅字
    if (sal.deductLabor > 0) row.getCell(17).font = red;     // (-)勞保
    if (sal.deductHealth > 0) row.getCell(18).font = red;    // (-)健保
    if (sal.deductFamily > 0) row.getCell(19).font = red;    // (-)家眷
    // 加給欄藍字
    if (sal.bonusUnusedLeave > 0) row.getCell(20).font = blue;       // (+)未休獎金
    if (sal.bonusMakeupWage > 0) row.getCell(21).font = blue;        // (+)調休工資
    if (sal.bonusPositionAllowance > 0) row.getCell(22).font = blue; // (+)職務津貼
    if (sal.bonusOther > 0) row.getCell(23).font = blue;             // (+)其他
    row.getCell(24).font = red;  // 漏打卡扣款
    row.getCell(25).font = red;  // 事假扣款
    row.getCell(26).font = red;  // 傷病假扣款
    row.getCell(27).font = red;  // 稽核扣款
    // 簽呈校正(AB)淺灰字(預設空白,提示人資填)
    row.getCell(28).font = { color: { argb: 'FF999999' }, italic: true };
    row.getCell(29).font = { bold: true };  // 實發薪資

    // 若稽核扣款 > 0,整列加淺藍底色
    if (sal.auditDeduct > 0) {
      const auditFill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFD6EAF8' } };
      for (let c = 1; c <= 29; c++) {
        row.getCell(c).fill = auditFill;
      }
    }

    summaryRowIdx++;
  }

  // 金額欄千分位(第 16 欄到第 29 欄)
  for (let c = 16; c <= 29; c++) {
    summary.getColumn(c).numFmt = '#,##0';
  }

  // 凍結窗格:首欄(A = 員工姓名)+ 首 3 列(標題、統計、表頭)
  // 左右捲動時員工姓名欄固定、上下捲動時表頭固定
  summary.views = [{ state: 'frozen', xSplit: 1, ySplit: 3 }];

  // ========== 月薪設定 sheet ==========
  // 位置:薪資總表 → 月薪設定 → 各員工 sheet
  // 內容 = 匯入的月薪資料(若有),或所有員工的當前設定(若沒匯入)
  const salarySheet = wb.addWorksheet('月薪設定');
  const hasImported = importOrder.length > 0;

  salarySheet.mergeCells('A1:L1');
  const title1 = salarySheet.getCell('A1');
  title1.value = hasImported
    ? `月薪設定(已匯入 ${importOrder.length} 位) · ${state.period}`
    : `月薪設定(使用預設) · ${state.period}`;
  title1.font = { bold: true, size: 14 };
  title1.alignment = { vertical: 'middle', horizontal: 'left' };
  salarySheet.getRow(1).height = 24;

  salarySheet.mergeCells('A2:L2');
  const desc2 = salarySheet.getCell('A2');
  desc2.value = hasImported
    ? '此分頁紀錄本次匯出時的月薪匯入資料,薪資順序依此而來。扣款欄(-)實發薪資時減去、加給欄(+)實發薪資時加上。'
    : `此分頁為系統預設(月薪 ${state.defaultSalary.toLocaleString()} / 應出勤 ${state.defaultWorkDays} 天),員工依姓名筆劃排序。未匯入時此欄為空。`;
  desc2.font = { size: 11, color: { argb: 'FFD43F3A' } };
  desc2.alignment = { vertical: 'middle', wrapText: true };
  salarySheet.getRow(2).height = 22;

  const salaryHeaders = [
    '員工姓名', '月薪(TWD)', '應出勤天數', 'Email',
    '(-)勞保', '(-)健保', '(-)家眷',
    '(+)未休獎金', '(+)調休工資', '(+)職務津貼', '(+)其他',
    '通知'
  ];
  const salaryHeaderR = salarySheet.getRow(3);
  salaryHeaders.forEach((h, i) => {
    const c = salaryHeaderR.getCell(i + 1);
    c.value = h;
    c.font = { bold: true, color: { argb: 'FFFFFFFF' } };
    c.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1A1A1A' } };
    c.alignment = { horizontal: 'center', vertical: 'middle' };
  });
  salaryHeaderR.height = 22;

  let sRow = 4;
  for (const n of names) {
    const emp = state.employees[n];
    if (!emp) continue;
    const row = salarySheet.getRow(sRow);
    row.getCell(1).value = emp.name;
    row.getCell(2).value = emp.salary ?? (hasImported ? '' : state.defaultSalary);
    row.getCell(3).value = emp.workDays ?? (hasImported ? '' : state.defaultWorkDays);
    row.getCell(4).value = emp.email || '';
    // 新增欄:扣款三項 + 加給四項
    row.getCell(5).value = emp.deductLabor ?? '';
    row.getCell(6).value = emp.deductHealth ?? '';
    row.getCell(7).value = emp.deductFamily ?? '';
    row.getCell(8).value = emp.bonusUnusedLeave ?? '';
    row.getCell(9).value = emp.bonusMakeupWage ?? '';
    row.getCell(10).value = emp.bonusPositionAllowance ?? '';
    row.getCell(11).value = emp.bonusOther ?? '';

    // 格式化
    row.getCell(2).numFmt = '#,##0';
    row.getCell(2).alignment = { horizontal: 'right' };
    row.getCell(3).alignment = { horizontal: 'right' };
    for (let c = 5; c <= 11; c++) {
      row.getCell(c).numFmt = '#,##0';
      row.getCell(c).alignment = { horizontal: 'right' };
    }

    if (emp.salary === undefined) {
      row.getCell(2).font = { color: { argb: 'FF999999' }, italic: true };
    }
    if (emp.workDays === undefined) {
      row.getCell(3).font = { color: { argb: 'FF999999' }, italic: true };
    }
    if (!emp.email) {
      row.getCell(4).font = { color: { argb: 'FF999999' }, italic: true };
      row.getCell(4).value = '—';
    }

    // 第 12 欄:通知按鈕(mailto 超連結,含 body)
    const notifyCell = row.getCell(12);
    if (emp.email) {
      const subject = `【小日子寫真館】${state.period || ''} 出勤明細 - ${emp.name}`;
      const body = buildEmailBody(emp.name);
      let mailtoUrl = `mailto:${emp.email.trim()}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      // 安全上限:Excel hyperlink 上限約 2083 字元
      if (mailtoUrl.length > 2000) {
        mailtoUrl = `mailto:${emp.email.trim()}?subject=${encodeURIComponent(subject)}`;
      }
      notifyCell.value = {
        text: '✉ 寄送通知',
        hyperlink: mailtoUrl,
        tooltip: `寄 email 給 ${emp.email}`,
      };
      notifyCell.font = { color: { argb: 'FF1E5FBF' }, underline: true, bold: true };
    } else {
      notifyCell.value = '—';
      notifyCell.font = { color: { argb: 'FFCCCCCC' }, italic: true };
    }
    notifyCell.alignment = { horizontal: 'center', vertical: 'middle' };

    sRow++;
  }

  salarySheet.getColumn(1).width = 14;
  salarySheet.getColumn(2).width = 12;
  salarySheet.getColumn(3).width = 12;
  salarySheet.getColumn(4).width = 24;
  for (let c = 5; c <= 11; c++) salarySheet.getColumn(c).width = 11;
  salarySheet.getColumn(12).width = 14;  // 通知
  salarySheet.views = [{ state: 'frozen', xSplit: 1, ySplit: 3 }];

  // ========== 每位員工獨立 sheet ==========
  const weekdayZh = ['日','一','二','三','四','五','六'];

  for (const n of names) {
    const emp = state.employees[n];
    const sal = calcSalary(n);
    const rule = emp.stats.rule;

    const sheetName = emp.name.substring(0, 28);
    const ws = wb.addWorksheet(sheetName, { views: [{ state: 'frozen', xSplit: 1, ySplit: 5 }] });

    // ===== 頂部員工資訊區(4 行) =====
    // 第 1 行:標題 + 返回總表連結
    ws.mergeCells('A1:F1');
    ws.getCell('A1').value = `${emp.name} · ${emp.workType || '—'} · ${String(rule.startH).padStart(2,'0')}:${String(rule.startM).padStart(2,'0')}–${String(rule.endH).padStart(2,'0')}:${String(rule.endM).padStart(2,'0')} · ${rule.isShift ? '排休制' : '週休制'}`;
    ws.getCell('A1').font = { bold: true, size: 14 };
    ws.getCell('A1').alignment = { vertical: 'middle' };

    // G1 放返回總表連結
    const backCell = ws.getCell('G1');
    backCell.value = {
      text: '← 返回總表',
      hyperlink: "#'薪資總表'!A1",
      tooltip: '返回薪資總表',
    };
    backCell.font = { color: { argb: 'FF1E5FBF' }, underline: true, size: 11 };
    backCell.alignment = { horizontal: 'right', vertical: 'middle' };
    ws.getRow(1).height = 24;

    // 第 2 行:期間、月薪、時薪、實發薪資(實發薪資黃底)
    ws.getCell('A2').value = `期間:${state.period}`;
    ws.mergeCells('A2:B2');
    ws.getCell('A2').font = { size: 12, color: { argb: 'FF333333' } };
    ws.getCell('A2').alignment = { vertical: 'middle' };

    ws.getCell('C2').value = `月薪:${sal.monthly.toLocaleString()}`;
    ws.getCell('C2').font = { size: 12, color: { argb: 'FF333333' } };
    ws.getCell('C2').alignment = { vertical: 'middle' };

    ws.getCell('D2').value = `時薪:${sal.hourlyWage.toLocaleString()}`;
    ws.getCell('D2').font = { size: 12, color: { argb: 'FF333333' } };
    ws.getCell('D2').alignment = { vertical: 'middle' };

    // 實發薪資 — 黃底 + 粗體,跨到 G 欄
    ws.mergeCells('E2:G2');
    ws.getCell('E2').value = `實發薪資:${sal.finalSalary.toLocaleString()}`;
    ws.getCell('E2').font = { size: 12, color: { argb: 'FF1A1A1A' }, bold: true };
    ws.getCell('E2').fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFF200' } };
    ws.getCell('E2').alignment = { vertical: 'middle' };
    ws.getRow(2).height = 22;

    // 第 3 行:本月總天數 + 非六日天數(紅字)
    ws.mergeCells('A3:G3');
    ws.getCell('A3').value = `本月總天數:${totalDaysInMonth}    非六日天數:${weekdayCount}`;
    ws.getCell('A3').font = { size: 12, color: { argb: 'FFD43F3A' }, bold: true };
    ws.getCell('A3').alignment = { vertical: 'middle' };
    ws.getRow(3).height = 20;

    // 第 4 行:出勤天數 + 應出勤 + 漏打卡 + 扣款 + 加班(紅字)
    let line4 = `出勤天數:${emp.stats.punchedDays}`;
    if (sal.isShift) {
      line4 += `  |  應出勤:${sal.expectedWorkDays}天(本月${sal.monthTotalDays}天-月休8天)`;
    } else {
      line4 += `  |  應出勤:${sal.expectedWorkDays}天(本月非六日天數)`;
    }
    line4 += `  |  漏打卡:${sal.missedDays}天`;
    if (sal.missedDeduct > 0) {
      line4 += `(-${sal.missedDeduct.toLocaleString()})`;
    }
    line4 += `  |  事假扣款:${sal.personalDeduct ? '-' + sal.personalDeduct.toLocaleString() : '0'}`;
    line4 += `  |  傷病假扣款:${sal.sickDeduct ? '-' + sal.sickDeduct.toLocaleString() : '0'}`;
    line4 += `  |  加班時數:${sal.otHours}  |  加班補休:${sal.otCompHours}`;
    ws.mergeCells('A4:G4');
    ws.getCell('A4').value = line4;
    ws.getCell('A4').font = { size: 12, color: { argb: 'FFD43F3A' }, bold: true };
    ws.getCell('A4').alignment = { vertical: 'middle', wrapText: true };
    ws.getRow(4).height = 36;

    // ===== 表頭(第 5 行) =====
    const headers = ['日期', '星期', '上班時間', '下班時間', '時數', '備註', '請假時數', '扣薪', '稽核', '稽核扣薪'];
    const headerR = ws.getRow(5);
    headers.forEach((h, i) => {
      const cell = headerR.getCell(i + 1);
      cell.value = h;
      cell.font = { bold: true, color: { argb: 'FFFFFFFF' } };
      cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1A1A1A' } };
      cell.alignment = { horizontal: 'center', vertical: 'middle' };
    });
    // 稽核兩欄表頭紅字
    headerR.getCell(9).font = { bold: true, color: { argb: 'FFFFC0C0' } };
    headerR.getCell(10).font = { bold: true, color: { argb: 'FFFFC0C0' } };
    headerR.height = 22;

    // 日期欄強制文字格式(避免 Excel 自動轉 3/1/26)
    ws.getColumn(1).numFmt = '@';

    // ===== 建立「日期 → record」映射 =====
    const recordMap = {};
    for (const r of emp.records) {
      if (r.date) recordMap[r.date] = r;
    }

    // ===== 資料列(從第 6 行起) =====
    const hourlyWage = sal.hourlyWage;
    let rowIdx = 6;

    for (const dateStr of sortedDates) {
      const r = recordMap[dateStr];
      const [y, m, d] = dateStr.split('-').map(Number);
      const jsDate = new Date(y, m - 1, d);
      const weekday = weekdayZh[jsDate.getDay()];

      let inTime = '—', outTime = '—', leaveDesc = '';
      let leaveHoursNum = 0, deductNum = 0;
      let isMissedPunch = false; // 漏打卡:缺卡且備註空白

      if (r) {
        if (r.punchIn) inTime = r.punchIn;
        if (r.punchOut) outTime = r.punchOut;

        const parsed = calcDayLeaveFromNote(r, rule);
        if (parsed.type) {
          leaveDesc = `[${parsed.type}] ${parsed.desc}`;
          const isLeaveType = !['加班', '加班補休'].includes(parsed.type);
          if (isLeaveType) {
            leaveHoursNum = parsed.hours;
          }
          if (parsed.type === '事假' && parsed.hours > 0) {
            deductNum = Math.round(parsed.hours * hourlyWage);
          } else if ((parsed.type === '普通傷病假' || parsed.type === '生理假') && parsed.hours > 0) {
            deductNum = Math.round(parsed.hours * hourlyWage * 0.5);
          }
        } else if (r.note) {
          leaveDesc = r.note;
        }

        // 漏打卡判斷:缺上班卡或下班卡、且備註全空
        const hasIn = !!r.punchIn;
        const hasOut = !!r.punchOut;
        const hasNote = !!(r.note && r.note.trim());
        if ((!hasIn || !hasOut) && !hasNote) {
          isMissedPunch = true;
        }
      }

      const row = ws.getRow(rowIdx);
      // 日期欄位:用純文字格式 + @ numFmt,防止 Excel 自動轉 3/1/26
      const dateCell = row.getCell(1);
      dateCell.numFmt = '@';
      dateCell.value = dateStr;
      dateCell.alignment = { horizontal: 'left', vertical: 'middle' };

      const wdCell = row.getCell(2);
      wdCell.value = weekday;
      wdCell.alignment = { horizontal: 'center', vertical: 'middle' };

      // 判斷打卡狀態
      const hasIn = r && !!r.punchIn;
      const hasOut = r && !!r.punchOut;
      const onlyOneMissing = r && (hasIn !== hasOut);  // 只缺其中一張(XOR)

      const inCell = row.getCell(3);
      inCell.value = inTime;
      inCell.alignment = { horizontal: 'center', vertical: 'middle' };
      if (onlyOneMissing) {
        // 只缺一張卡 → 紅字
        inCell.font = { color: { argb: 'FFD43F3A' }, bold: true };
      } else if (inTime === '—') {
        // 兩張都缺 → 灰字
        inCell.font = { color: { argb: 'FFBBBBBB' } };
      }

      const outCell = row.getCell(4);
      outCell.value = outTime;
      outCell.alignment = { horizontal: 'center', vertical: 'middle' };
      if (onlyOneMissing) {
        outCell.font = { color: { argb: 'FFD43F3A' }, bold: true };
      } else if (outTime === '—') {
        outCell.font = { color: { argb: 'FFBBBBBB' } };
      }

      // 時數 = 下班時間 − 上班時間(四捨五入至小數點後一位)
      const workHrCell = row.getCell(5);
      if (r && r.punchIn && r.punchOut) {
        const [wih, wim] = r.punchIn.split(':').map(Number);
        const [woh, wom] = r.punchOut.split(':').map(Number);
        const diffMin = (woh * 60 + wom) - (wih * 60 + wim);
        if (diffMin > 0) workHrCell.value = Math.round(diffMin / 6) / 10;
      }
      workHrCell.alignment = { horizontal: 'right', vertical: 'middle' };
      workHrCell.numFmt = '0.0';

      const descCell = row.getCell(6);
      descCell.value = leaveDesc || '';
      descCell.alignment = { horizontal: 'left', vertical: 'middle' };

      const hoursCell = row.getCell(7);
      if (leaveHoursNum > 0) {
        hoursCell.value = leaveHoursNum;
        hoursCell.font = { color: { argb: 'FFD43F3A' }, bold: true };
      }
      hoursCell.alignment = { horizontal: 'right', vertical: 'middle' };
      hoursCell.numFmt = '0.##';

      const dedCell = row.getCell(8);
      if (deductNum > 0) {
        dedCell.value = -deductNum;
        dedCell.font = { color: { argb: 'FFD43F3A' }, bold: true };
      }
      dedCell.alignment = { horizontal: 'right', vertical: 'middle' };
      dedCell.numFmt = '#,##0';

      // 週末淡灰底
      const wd = jsDate.getDay();
      if (wd === 0 || wd === 6) {
        for (let c = 1; c <= 8; c++) {
          row.getCell(c).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF5F5F0' } };
        }
        wdCell.font = { color: { argb: 'FFC9A961' }, bold: true };
      }

      // 漏打卡:上班時間、下班時間兩格改淡黃底(覆蓋可能的週末灰底)
      if (isMissedPunch) {
        inCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFF8C4' } };
        outCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFF8C4' } };
      }

      // ===== 稽核計算 =====
      // 標準工時:
      //   - 業務類型:整天請假時 8hr,其餘 7hr
      //   - 其他類型:一律 8hr
      // 實際時數 = 打卡時段 + 所有請假時數 + 當日加班補休(加班不算)
      // 不足 = max(0, 標準 − 實際)
      // 以下情況不計稽核:
      //   - 漏打卡日(缺卡+無備註) — 已由 V3 漏打卡扣薪處理
      //   - 只缺一張卡 — 視為忘打卡,員工實際有上班(例如只打了上班卡但有加班備註)
      //   - 稽核時數 < 0.5hr — 避免打卡時間零星誤差造成的小扣款
      const auditCell = row.getCell(9);
      const auditDedCell = row.getCell(10);
      auditCell.alignment = { horizontal: 'right', vertical: 'middle' };
      auditCell.numFmt = '0.##';
      auditDedCell.alignment = { horizontal: 'right', vertical: 'middle' };
      auditDedCell.numFmt = '#,##0';

      let hasAuditDeduct = false;  // 該日是否有稽核扣款

      if (r && !isMissedPunch && !onlyOneMissing) {
        const { actualHours, isFullDayLeave } = calcDayActualHours(r, rule);

        // 特殊情況:無打卡 + 沒請假 + 只有加班備註 → 視為排休日加班,稽核不計
        const hasPunch = !!(r.punchIn || r.punchOut);
        const segments = parseAllLeavesFromNote(r, rule);
        const hasOnlyOvertime = segments.length > 0 && segments.every(s => s.type === '加班');

        const isYangMei = (emp.workType || '').includes('楊梅-週一至週五')
                      || (emp.workType || '').includes('楊梅-排休');
        const isSatSun = wd === 0 || wd === 6;

        if (!hasPunch && hasOnlyOvertime) {
          // 排休日加班,稽核不計
        } else if (isFullDayLeave) {
          // 整天請假(無打卡 + 有請假):比對標準 8hr
          const rawShortfall = Math.max(0, 8 - actualHours);
          const shortfall = Math.round(rawShortfall * 2) / 2;
          if (shortfall >= 0.5) {
            const auditDed = Math.round(shortfall * hourlyWage);
            auditCell.value = shortfall;
            auditCell.font = { color: { argb: 'FFD43F3A' }, bold: true };
            auditDedCell.value = -auditDed;
            auditDedCell.font = { color: { argb: 'FFD43F3A' }, bold: true };
            hasAuditDeduct = true;
          }
        } else if (hasPunch) {
          // 有打卡日 ===== V29 規則 =====
          // 通用:
          //   - 實際工時 > 7hr → 豁免稽核
          //   - 遲到容忍 15 分、下班不容忍
          //   - 稽核 = 遲到 + 早退(封頂 8hr、四捨五入 0.5、< 0.5 不計)
          // 業務類型:
          //   - 工時 > 6hr → 目標下班 = 標準 − 1hr(18:30)
          //   - 工時 ≤ 6hr → 目標下班 = 標準(19:30)
          // 楊梅週末(楊梅-週一至週五 / 楊梅-排休,且週六/日):
          //   - 工時 > 5hr → 視為滿 8hr,豁免
          //   - 工時 ≤ 5hr → 稽核 = 8 − 工時(封頂 8hr)
          const isSalesRole = (emp.workType || '').includes('業務');
          const stdIn = rule.startH + rule.startM / 60;
          const stdOut = rule.endH + rule.endM / 60;

          const [ih, im] = r.punchIn.split(':').map(Number);
          const [oh, om] = r.punchOut.split(':').map(Number);
          const rawIn = ih + im / 60;
          const rawOut = oh + om / 60;

          const paidCover = segments
            .filter(s => s.type !== '加班')
            .reduce((sum, s) => sum + s.hours, 0);

          // 實際工時(扣午休 if 跨)
          let workHours = Math.max(0, rawOut - rawIn);
          if (rawIn <= (rule.lunchStart ?? 12.5) && rawOut >= (rule.lunchEnd ?? 13.5) && workHours >= 5) workHours -= 1;
          workHours += paidCover;

          let rawShortfall = 0;

          if (isYangMei && isSatSun) {
            // 楊梅週末:工時 > 5hr 豁免、≤ 5hr 用 8 − 工時
            if (workHours > 5) {
              rawShortfall = 0;
            } else {
              rawShortfall = Math.max(0, 8 - workHours);
            }
          } else if (workHours > 7) {
            // 通用豁免:工時 > 7hr
            rawShortfall = 0;
          } else if (isSalesRole && workHours <= 6) {
            // 業務且工時 ≤ 6hr → 8 − 工時(workHours 已含 paidCover)
            rawShortfall = Math.max(0, 8 - workHours);
          } else {
            // 業務工時 > 6(目標 18:30)或非業務 → 用遲到+早退
            const outTarget = (isSalesRole && workHours > 6) ? (stdOut - 1) : stdOut;
            // 遲到容忍 15 分、早退不容忍
            const late = Math.max(0, rawIn - (stdIn + 0.25));
            const earlyOut = Math.max(0, outTarget - rawOut);
            rawShortfall = late + earlyOut;
            rawShortfall = Math.max(0, rawShortfall - paidCover);
          }

          rawShortfall = Math.min(rawShortfall, 8);
          const shortfall = Math.round(rawShortfall * 2) / 2;
          if (shortfall >= 0.5) {
            const auditDed = Math.round(shortfall * hourlyWage);
            auditCell.value = shortfall;
            auditCell.font = { color: { argb: 'FFD43F3A' }, bold: true };
            auditDedCell.value = -auditDed;
            auditDedCell.font = { color: { argb: 'FFD43F3A' }, bold: true };
            hasAuditDeduct = true;
          }
        }
      }

      // 週末淡灰底延伸到新加的兩欄
      if (wd === 0 || wd === 6) {
        auditCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF5F5F0' } };
        auditDedCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF5F5F0' } };
      }

      // 該日有稽核扣款 → 整列淺藍底(覆蓋週末灰底)
      if (hasAuditDeduct) {
        const auditFill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFD6EAF8' } };
        for (let c = 1; c <= 10; c++) {
          row.getCell(c).fill = auditFill;
        }
      }

      rowIdx++;
    }

    // 總計列
    const lastDataRow = rowIdx - 1;
    const totalRow = ws.getRow(rowIdx);
    totalRow.getCell(1).value = '合計';
    ws.mergeCells(rowIdx, 1, rowIdx, 6);
    totalRow.getCell(1).alignment = { horizontal: 'right', vertical: 'middle' };
    totalRow.getCell(1).font = { bold: true };

    const sumH = totalRow.getCell(7);
    sumH.value = { formula: `SUM(G6:G${lastDataRow})`, result: 0 };
    sumH.font = { color: { argb: 'FFD43F3A' }, bold: true };
    sumH.alignment = { horizontal: 'right', vertical: 'middle' };
    sumH.numFmt = '0.##';

    const sumD = totalRow.getCell(8);
    sumD.value = { formula: `SUM(H6:H${lastDataRow})`, result: 0 };
    sumD.font = { color: { argb: 'FFD43F3A' }, bold: true };
    sumD.alignment = { horizontal: 'right', vertical: 'middle' };
    sumD.numFmt = '#,##0';

    // 稽核合計
    const sumAudit = totalRow.getCell(9);
    sumAudit.value = { formula: `SUM(I6:I${lastDataRow})`, result: 0 };
    sumAudit.font = { color: { argb: 'FFD43F3A' }, bold: true };
    sumAudit.alignment = { horizontal: 'right', vertical: 'middle' };
    sumAudit.numFmt = '0.##';

    const sumAuditDed = totalRow.getCell(10);
    sumAuditDed.value = { formula: `SUM(J6:J${lastDataRow})`, result: 0 };
    sumAuditDed.font = { color: { argb: 'FFD43F3A' }, bold: true };
    sumAuditDed.alignment = { horizontal: 'right', vertical: 'middle' };
    sumAuditDed.numFmt = '#,##0';

    // 總計列底色延伸到 10 欄
    for (let c = 1; c <= 10; c++) {
      totalRow.getCell(c).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFF9EE' } };
    }
    totalRow.height = 22;

    // 欄寬
    ws.getColumn(1).width = 12;
    ws.getColumn(2).width = 6;
    ws.getColumn(3).width = 11;
    ws.getColumn(4).width = 11;
    ws.getColumn(5).width = 8;   // 時數
    ws.getColumn(6).width = 46;
    ws.getColumn(7).width = 10;
    ws.getColumn(8).width = 12;
    ws.getColumn(9).width = 8;    // 稽核
    ws.getColumn(10).width = 11;  // 稽核扣薪
  }

  // ========== 下載 ==========
  const buf = await wb.xlsx.writeBuffer();
  const blob = new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  // 時間戳 YYYYMMDD-HHMMSS(使用當下時間,方便區分不同匯出版本)
  const now = new Date();
  const pad = (n) => String(n).padStart(2, '0');
  const timestamp = `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
  a.download = `薪資統計_${state.period || 'report'}_${APP_VERSION}_${timestamp}.xlsx`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function reset() {
  state.rawData = null;
  state.employees = {};
  state.fileName = '';
  state.period = '';
  state.selectedEmp = null;
  document.getElementById('dropMain').textContent = '點擊或拖曳檔案至此處';
  document.getElementById('uploadError').classList.add('hidden');
  render();
}

function updateSalary(name, val) {
  if (state.employees[name]) {
    state.employees[name].salary = Number(val);
    render();
  }
}
function updateWorkDays(name, val) {
  if (state.employees[name]) {
    state.employees[name].workDays = Number(val);
    render();
  }
}

// =============== Render ===============
function render() {
  const hasData = state.rawData !== null;
  document.getElementById('uploadScreen').classList.toggle('hidden', hasData);
  const cardsMode = state.viewMode === 'cards';
  document.getElementById('mainLayout').classList.toggle('hidden', !hasData || !cardsMode);
  document.getElementById('tableLayout').classList.toggle('hidden', !hasData || cardsMode);

  const actions = document.getElementById('headerActions');
  if (hasData) {
    actions.innerHTML = `
      <div class="view-toggle">
        <button class="${cardsMode ? 'active' : ''}" onclick="setViewMode('cards')">卡片模式</button>
        <button class="${!cardsMode ? 'active' : ''}" onclick="setViewMode('table')">表格模式</button>
      </div>
      <div class="divider"></div>
      <div class="period-box">
        <div class="lbl">Period</div>
        <div class="val">${esc(state.period)}</div>
      </div>
      <div class="divider"></div>
      <button class="btn btn-gold" onclick="downloadTemplate()">${ICONS.download} 月薪範本</button>
      <button class="btn btn-gold" onclick="document.getElementById('salaryFileInput').click()">${ICONS.sheet} 匯入月薪</button>
      <button class="btn btn-gold" onclick="notifyAllEmployees()" title="為每位有 Email 的員工開啟郵件撰寫視窗">✉ 統一通知</button>
      <div class="divider"></div>
      <button class="btn btn-outline" onclick="reset()">重新上傳</button>
      <button class="btn btn-primary" onclick="exportReport()">${ICONS.download} 匯出報表</button>
    `;
  } else {
    actions.innerHTML = '';
  }

  if (!hasData) return;

  if (cardsMode) {
    renderCardsMode();
  } else {
    renderTableMode();
  }
}

function setViewMode(mode) {
  state.viewMode = mode;
  // 第一次進表格模式時,若還沒設定 activeTab 的員工名,預設為 summary
  if (mode === 'table' && !state.activeTab) state.activeTab = 'summary';
  render();
}

function renderCardsMode() {
  const empList = Object.values(state.employees).sort((a,b) => a.name.localeCompare(b.name, 'zh-Hant'));
  document.getElementById('empCount').textContent = `· ${empList.length}`;

  // Sidebar
  document.getElementById('empListEl').innerHTML = empList.map(emp => {
    const s = calcSalary(emp.name);
    const isSel = state.selectedEmp === emp.name;
    const hasAlert = (emp.stats.leaveHours['事假']||0) > 0 || (emp.stats.leaveHours['普通傷病假']||0) > 0 || emp.stats.missedPunch > 0;
    const isDefault = emp.salary === undefined;
    return `
      <div class="emp-card ${isSel ? 'active' : ''}" onclick="selectEmp('${esc(emp.name)}')">
        <div style="min-width:0;flex:1">
          <div class="name serif">${esc(emp.name)}${hasAlert ? '<span class="dot" title="有影響薪資的假別"></span>' : ''}</div>
          <div class="wtype">${esc(emp.workType || '—')}</div>
        </div>
        <div class="salary">
          <div class="n">${s.finalSalary.toLocaleString()}</div>
          <div class="u ${isDefault ? 'default' : ''}">${isDefault ? '預設薪資' : 'TWD'}</div>
        </div>
      </div>
    `;
  }).join('');

  // Main
  if (state.selectedEmp && state.employees[state.selectedEmp]) {
    renderDetail(state.selectedEmp);
  } else {
    renderOverview(empList);
  }
}

function selectEmp(name) {
  state.selectedEmp = name;
  render();
}
function backToOverview() {
  state.selectedEmp = null;
  render();
}

// ========== 表格模式(Excel 樣式)==========
function renderTableMode() {
  // 取得員工排序(與匯出順序同)
  const importOrder = state.salaryImportOrder || [];
  const allNames = Object.keys(state.employees);
  const inImport = importOrder.filter(n => state.employees[n]);
  const rest = allNames.filter(n => !importOrder.includes(n))
    .sort((a, b) => a.localeCompare(b, 'zh-Hant'));
  const names = [...inImport, ...rest];

  // 如果 activeTab 是某個員工但那員工已不存在 → 退回 summary
  if (state.activeTab !== 'summary' && state.activeTab !== 'salary' && !state.employees[state.activeTab]) {
    state.activeTab = 'summary';
  }

  // === 上方內容 ===
  const scroll = document.getElementById('tableScroll');
  if (state.activeTab === 'summary') {
    scroll.innerHTML = renderSummaryTable(names);
  } else if (state.activeTab === 'salary') {
    scroll.innerHTML = renderSalarySettingsTable(names);
  } else {
    scroll.innerHTML = renderEmployeeSheetTable(state.activeTab);
  }

  // === 下方頁籤列 ===
  const tabsHtml = [];
  tabsHtml.push(`<div class="tbl-tab summary-tab ${state.activeTab === 'summary' ? 'active' : ''}" onclick="setActiveTab('summary')">薪資總表</div>`);
  tabsHtml.push(`<div class="tbl-tab summary-tab ${state.activeTab === 'salary' ? 'active' : ''}" onclick="setActiveTab('salary')">月薪設定</div>`);
  for (const n of names) {
    const sel = state.activeTab === n ? 'active' : '';
    tabsHtml.push(`<div class="tbl-tab ${sel}" onclick="setActiveTab('${esc(n)}')">${esc(n)}</div>`);
  }
  document.getElementById('tableTabs').innerHTML = tabsHtml.join('');
}

function setActiveTab(tab) {
  state.activeTab = tab;
  render();
}

// 取得編輯後的值(若有 override 則返回該值,否則返回預設值)
function getOverride(empName, field, defaultVal) {
  const key = `${empName}|${field}`;
  return state.overrides[key] !== undefined ? state.overrides[key] : defaultVal;
}
// 設定 override 並重繪
function setOverride(empName, field, value) {
  const key = `${empName}|${field}`;
  // 如果等於計算預設值,視為清除
  state.overrides[key] = value;
  render();
}

function renderSummaryTable(names) {
  const { totalDays: monthTotalDays, weekdays: monthWeekdays } = getMonthInfo();
  const weekendDays = monthTotalDays - monthWeekdays;

  // 28 欄表頭(對應匯出 Excel 的薪資總表)
  const cols = [
    { k: 'name', label: '員工姓名', w: 100 },
    { k: 'workType', label: '工時類型', w: 120 },
    { k: 'punchedDays', label: '出勤天數', w: 70, num: true },
    { k: 'expectedWorkDays', label: '應出勤', w: 60, num: true },
    { k: 'missedDays', label: '漏打卡天數', w: 80, num: true, edit: true },
    { k: 'leave_事假', label: '事假時數', w: 70, num: true, edit: true },
    { k: 'leave_普通傷病假', label: '普通傷病假時數', w: 100, num: true, edit: true },
    { k: 'leave_特休假', label: '特休假時數', w: 80, num: true, edit: true },
    { k: 'leave_生理假', label: '生理假時數', w: 80, num: true, edit: true },
    { k: 'leave_公假', label: '公假時數', w: 70, num: true, edit: true },
    { k: 'leave_婚假', label: '婚假時數', w: 70, num: true, edit: true },
    { k: 'leave_喪假', label: '喪假時數', w: 70, num: true, edit: true },
    { k: 'otHours', label: '加班時數', w: 70, num: true, edit: true },
    { k: 'otCompHours', label: '加班補休時數', w: 90, num: true, edit: true },
    { k: 'auditHours', label: '稽核時數', w: 70, num: true, edit: true },
    { k: 'monthly', label: '月薪', w: 80, num: true, edit: true },
    // V53 新欄:扣款三項
    { k: 'deductLabor', label: '(-)勞保', w: 80, num: true, neg: true, edit: true },
    { k: 'deductHealth', label: '(-)健保', w: 80, num: true, neg: true, edit: true },
    { k: 'deductFamily', label: '(-)家眷', w: 80, num: true, neg: true, edit: true },
    // V53 新欄:加給四項
    { k: 'bonusUnusedLeave', label: '(+)未休獎金', w: 90, num: true, edit: true, bonus: true },
    { k: 'bonusMakeupWage', label: '(+)調休工資', w: 90, num: true, edit: true, bonus: true },
    { k: 'bonusPositionAllowance', label: '(+)職務津貼', w: 90, num: true, edit: true, bonus: true },
    { k: 'bonusOther', label: '(+)其他', w: 80, num: true, edit: true, bonus: true },
    // 計算扣款四項(原)
    { k: 'missedDeduct', label: '漏打卡扣款', w: 90, num: true, neg: true, edit: true },
    { k: 'personalDeduct', label: '事假扣款', w: 80, num: true, neg: true, edit: true },
    { k: 'sickDeduct', label: '傷病假扣款', w: 90, num: true, neg: true, edit: true },
    { k: 'auditDeduct', label: '稽核扣款', w: 80, num: true, neg: true, edit: true },
    // V54 新欄:簽呈校正(可正可負)
    { k: 'adjustment', label: '簽呈校正', w: 90, num: true, edit: true },
    { k: 'finalSalary', label: '實發薪資', w: 90, num: true },
  ];

  const headRow = cols.map(c =>
    `<th style="min-width:${c.w}px">${c.label}</th>`
  ).join('');

  const bodyRows = names.map(n => {
    const emp = state.employees[n];
    const s = calcSalary(n);
    const hasAudit = (s.auditDeduct || 0) > 0;
    const rowClass = hasAudit ? 'audit-row' : '';

    const tds = cols.map(c => {
      let val = '';
      let extraClass = c.num ? 'num' : '';
      if (c.neg) extraClass += ' neg';

      if (c.k === 'name') {
        return `<td class="link" onclick="setActiveTab('${esc(n)}')">${esc(n)}</td>`;
      } else if (c.k === 'workType') {
        val = emp.workType || '—';
      } else if (c.k === 'punchedDays') val = emp.stats.punchedDays;
      else if (c.k === 'expectedWorkDays') val = s.expectedWorkDays;
      else if (c.k === 'missedDays') val = getOverride(n, 'missedDays', s.missedDays);
      else if (c.k.startsWith('leave_')) {
        const t = c.k.substring(6);
        val = getOverride(n, c.k, emp.stats.leaveHours[t] || 0);
      } else if (c.k === 'otHours') val = getOverride(n, 'otHours', s.otHours);
      else if (c.k === 'otCompHours') val = getOverride(n, 'otCompHours', s.otCompHours);
      else if (c.k === 'auditHours') val = getOverride(n, 'auditHours', s.auditHours);
      else if (c.k === 'monthly') val = getOverride(n, 'monthly', s.monthly);
      // V53 新欄
      else if (c.k === 'deductLabor') val = getOverride(n, 'deductLabor', s.deductLabor || 0);
      else if (c.k === 'deductHealth') val = getOverride(n, 'deductHealth', s.deductHealth || 0);
      else if (c.k === 'deductFamily') val = getOverride(n, 'deductFamily', s.deductFamily || 0);
      else if (c.k === 'bonusUnusedLeave') val = getOverride(n, 'bonusUnusedLeave', s.bonusUnusedLeave || 0);
      else if (c.k === 'bonusMakeupWage') val = getOverride(n, 'bonusMakeupWage', s.bonusMakeupWage || 0);
      else if (c.k === 'bonusPositionAllowance') val = getOverride(n, 'bonusPositionAllowance', s.bonusPositionAllowance || 0);
      else if (c.k === 'bonusOther') val = getOverride(n, 'bonusOther', s.bonusOther || 0);
      else if (c.k === 'missedDeduct') val = getOverride(n, 'missedDeduct', s.missedDeduct);
      else if (c.k === 'personalDeduct') val = getOverride(n, 'personalDeduct', s.personalDeduct);
      else if (c.k === 'sickDeduct') val = getOverride(n, 'sickDeduct', s.sickDeduct);
      else if (c.k === 'auditDeduct') val = getOverride(n, 'auditDeduct', s.auditDeduct);
      else if (c.k === 'adjustment') val = getOverride(n, 'adjustment', 0);
      else if (c.k === 'finalSalary') {
        // 動態重算:實發 = 月薪 + 加給 − 扣款 + 簽呈校正(可正可負)
        const monthly = Number(getOverride(n, 'monthly', s.monthly)) || 0;
        const dLabor = Number(getOverride(n, 'deductLabor', s.deductLabor || 0)) || 0;
        const dHealth = Number(getOverride(n, 'deductHealth', s.deductHealth || 0)) || 0;
        const dFamily = Number(getOverride(n, 'deductFamily', s.deductFamily || 0)) || 0;
        const bUnused = Number(getOverride(n, 'bonusUnusedLeave', s.bonusUnusedLeave || 0)) || 0;
        const bMakeup = Number(getOverride(n, 'bonusMakeupWage', s.bonusMakeupWage || 0)) || 0;
        const bPosition = Number(getOverride(n, 'bonusPositionAllowance', s.bonusPositionAllowance || 0)) || 0;
        const bOther = Number(getOverride(n, 'bonusOther', s.bonusOther || 0)) || 0;
        const d1 = Number(getOverride(n, 'missedDeduct', s.missedDeduct)) || 0;
        const d2 = Number(getOverride(n, 'personalDeduct', s.personalDeduct)) || 0;
        const d3 = Number(getOverride(n, 'sickDeduct', s.sickDeduct)) || 0;
        const d4 = Number(getOverride(n, 'auditDeduct', s.auditDeduct)) || 0;
        const adj = Number(getOverride(n, 'adjustment', 0)) || 0;
        val = monthly + bUnused + bMakeup + bPosition + bOther - dLabor - dHealth - dFamily - d1 - d2 - d3 - d4 + adj;
      }

      // 顯示值處理(0 留空、金額顯示 - 前綴)
      let displayVal = val;
      if (c.num && (val === 0 || val === '' || val === null || val === undefined)) {
        displayVal = '0';
      } else if (c.num && c.neg && Number(val) > 0) {
        displayVal = '-' + Number(val).toLocaleString();
      } else if (c.num && Number(val) === Number(val)) {
        displayVal = Number(val).toLocaleString();
      } else {
        displayVal = esc(String(val));
      }

      if (c.edit) {
        return `<td class="${extraClass} editable" contenteditable="true"
          data-emp="${esc(n)}" data-field="${c.k}" data-neg="${c.neg ? '1' : '0'}"
          onblur="onCellEdit(this)"
          onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}"
          >${displayVal}</td>`;
      } else {
        return `<td class="${extraClass}">${displayVal}</td>`;
      }
    });

    return `<tr class="${rowClass}">${tds.join('')}</tr>`;
  }).join('');

  return `
    <div class="tbl-title">薪資統計總表 · ${esc(state.period)}</div>
    <div class="tbl-summary-meta">本月總天數:${monthTotalDays}  |  非六日天數(平日):${monthWeekdays}  |  六日天數:${weekendDays}  |  員工總數:${names.length}  |  提示:可編輯欄位直接點擊輸入(不影響個人 sheet 計算)</div>
    <table class="xls-table">
      <thead><tr>${headRow}</tr></thead>
      <tbody>${bodyRows}</tbody>
    </table>
  `;
}

// 儲存格失焦事件:讀取新值、驗證、存到 overrides
function onCellEdit(el) {
  const emp = el.getAttribute('data-emp');
  const field = el.getAttribute('data-field');
  const isNeg = el.getAttribute('data-neg') === '1';
  let text = (el.textContent || '').trim().replace(/,/g, '');
  // 對於被標為 neg 的扣款欄,儲存時存成正數(顯示時加 -);
  // 其他欄(含可正可負的 adjustment)保留原符號
  if (isNeg) text = text.replace(/^-/, '');
  let num = Number(text);
  if (isNaN(num)) num = 0;
  setOverride(emp, field, num);
}

function onSettingsEdit(el) {
  const emp = el.getAttribute('data-emp');
  const field = el.getAttribute('data-field');
  let text = (el.textContent || '').trim().replace(/,/g, '');
  const e = state.employees[emp];
  if (!e) return;

  if (field === 'settings_monthly') {
    const num = Number(text);
    if (!isNaN(num) && num > 0) e.salary = num;
  } else if (field === 'settings_workDays') {
    const num = Number(text);
    if (!isNaN(num) && num > 0) e.workDays = num;
  } else if (field === 'settings_email') {
    if (text === '—' || text === '') e.email = '';
    else e.email = text;
  } else if (field.startsWith('settings_')) {
    // V53 新欄:deductLabor/Health/Family、bonusUnusedLeave/MakeupWage/PositionAllowance/Other
    const key = field.substring(9);
    const validKeys = ['deductLabor', 'deductHealth', 'deductFamily',
                       'bonusUnusedLeave', 'bonusMakeupWage', 'bonusPositionAllowance', 'bonusOther'];
    if (validKeys.includes(key)) {
      if (text === '') {
        delete e[key];
      } else {
        const num = Number(text);
        if (!isNaN(num) && num >= 0) e[key] = num;
      }
    }
  }
  render();
}

function renderEmployeeSheetTable(name) {
  const emp = state.employees[name];
  if (!emp) return '<div class="tbl-title">員工不存在</div>';
  const sal = calcSalary(name);
  const rule = emp.stats.rule;
  const weekdayZh = ['日','一','二','三','四','五','六'];

  // 建立每日資料
  const allDates = new Set();
  for (const r of emp.records) if (r.date) allDates.add(r.date);
  const sortedDates = [...allDates].sort();
  const recordMap = {};
  for (const r of emp.records) if (r.date) recordMap[r.date] = r;

  const isSalesRole = (emp.workType || '').includes('業務');
  const isYangMei = (emp.workType || '').includes('楊梅-週一至週五')
                 || (emp.workType || '').includes('楊梅-排休');

  const hourlyWage = sal.hourlyWage;
  let sumLeaveHr = 0, sumDeduct = 0, sumAuditHr = 0, sumAuditDed = 0;

  const rows = sortedDates.map(dateStr => {
    const r = recordMap[dateStr];
    const [y, m, d] = dateStr.split('-').map(Number);
    const dow = new Date(y, m - 1, d).getDay();
    const wLabel = weekdayZh[dow];
    const isWeekend = (dow === 0 || dow === 6);

    const inT = (r && r.punchIn) ? r.punchIn : '—';
    const outT = (r && r.punchOut) ? r.punchOut : '—';
    let noteText = '';
    let leaveHrNum = 0, deductNum = 0;
    if (r && r.note && r.note.trim()) {
      noteText = r.note.trim();
      const parsed = calcDayLeaveFromNote(r, rule);
      if (parsed.type && !['加班', '加班補休'].includes(parsed.type) && parsed.hours > 0) {
        leaveHrNum = parsed.hours;
        if (parsed.type === '事假') deductNum = Math.round(parsed.hours * hourlyWage);
        else if (parsed.type === '普通傷病假' || parsed.type === '生理假') deductNum = Math.round(parsed.hours * hourlyWage * 0.5);
      }
    }

    // 稽核
    let auditHrNum = 0, auditDedNum = 0;
    const hasIn = !!(r && r.punchIn);
    const hasOut = !!(r && r.punchOut);
    if (hasIn && hasOut) {
      const [ih, im] = r.punchIn.split(':').map(Number);
      const [oh, om] = r.punchOut.split(':').map(Number);
      const rawIn = ih + im / 60, rawOut = oh + om / 60;
      let workHours = Math.max(0, rawOut - rawIn);
      if (rawIn <= (rule.lunchStart ?? 12.5) && rawOut >= (rule.lunchEnd ?? 13.5) && workHours >= 5) workHours -= 1;
      const segments = parseAllLeavesFromNote(r, rule);
      const paidCover = segments.filter(s => s.type !== '加班').reduce((sum, s) => sum + s.hours, 0);
      workHours += paidCover;
      let shortfall = 0;
      if (isYangMei && isWeekend) {
        if (workHours <= 5) shortfall = Math.max(0, 8 - workHours);
      } else if (workHours > 7) {
        shortfall = 0;
      } else if (isSalesRole && workHours <= 6) {
        // 業務且工時 ≤ 6hr → 8 − 工時(workHours 已含 paidCover)
        shortfall = Math.max(0, 8 - workHours);
      } else {
        const stdIn = rule.startH + rule.startM / 60, stdOut = rule.endH + rule.endM / 60;
        const outTarget = (isSalesRole && workHours > 6) ? (stdOut - 1) : stdOut;
        const late = Math.max(0, rawIn - (stdIn + 0.25));
        const earlyOut = Math.max(0, outTarget - rawOut);
        shortfall = Math.max(0, late + earlyOut - paidCover);
      }
      shortfall = Math.min(shortfall, 8);
      shortfall = Math.round(shortfall * 2) / 2;
      if (shortfall >= 0.5) { auditHrNum = shortfall; auditDedNum = Math.round(shortfall * hourlyWage); }
    }

    sumLeaveHr += leaveHrNum; sumDeduct += deductNum;
    sumAuditHr += auditHrNum; sumAuditDed += auditDedNum;

    // 時數 = 下班時間 − 上班時間(四捨五入至小數點後一位)
    let workHrDisplay = '';
    if (hasIn && hasOut) {
      const [wih, wim] = r.punchIn.split(':').map(Number);
      const [woh, wom] = r.punchOut.split(':').map(Number);
      const diffMin = (woh * 60 + wom) - (wih * 60 + wim);
      if (diffMin > 0) workHrDisplay = (Math.round(diffMin / 6) / 10).toFixed(1);
    }

    const trBg = isWeekend ? 'background:#f5f5f0' : '';
    const rowStyle = auditHrNum > 0 ? 'background:#d6eaf8' : trBg;
    const inClr = (hasIn !== hasOut) ? 'color:#d43f3a;font-weight:700' : (!hasIn ? 'color:#ccc' : '');
    const outClr = (hasIn !== hasOut) ? 'color:#d43f3a;font-weight:700' : (!hasOut ? 'color:#ccc' : '');
    return `
      <tr style="${rowStyle}">
        <td>${dateStr}</td>
        <td style="text-align:center">${wLabel}</td>
        <td style="text-align:center;${inClr}">${inT}</td>
        <td style="text-align:center;${outClr}">${outT}</td>
        <td class="num">${workHrDisplay}</td>
        <td>${esc(noteText)}</td>
        <td class="num">${leaveHrNum > 0 ? leaveHrNum : ''}</td>
        <td class="num neg">${deductNum > 0 ? '-' + deductNum.toLocaleString() : ''}</td>
        <td class="num">${auditHrNum > 0 ? auditHrNum : ''}</td>
        <td class="num neg">${auditDedNum > 0 ? '-' + auditDedNum.toLocaleString() : ''}</td>
      </tr>
    `;
  }).join('');

  return `
    <div class="tbl-title">${esc(emp.name)} · ${esc(emp.workType || '—')} · ${String(rule.startH).padStart(2,'0')}:${String(rule.startM).padStart(2,'0')}–${String(rule.endH).padStart(2,'0')}:${String(rule.endM).padStart(2,'0')} · ${rule.isShift ? '排休制' : '週休制'}</div>
    <div class="tbl-summary-meta">期間:${esc(state.period)}  |  月薪:${sal.monthly.toLocaleString()}  |  時薪:${sal.hourlyWage}  |  <span style="background:#fff200;padding:2px 6px">實發薪資:${sal.finalSalary.toLocaleString()}</span></div>
    <div class="tbl-summary-meta">出勤:${emp.stats.punchedDays}  |  應出勤:${sal.expectedWorkDays}天  |  漏打卡:${sal.missedDays}天${sal.missedDeduct ? `(-${sal.missedDeduct.toLocaleString()})` : ''}  |  事假:-${sal.personalDeduct.toLocaleString()}  |  傷病假:-${sal.sickDeduct.toLocaleString()}  |  加班:${sal.otHours}  |  加班補休:${sal.otCompHours}</div>
    <table class="xls-table">
      <thead>
        <tr>
          <th style="min-width:100px">日期</th>
          <th style="min-width:40px">星期</th>
          <th style="min-width:70px">上班時間</th>
          <th style="min-width:70px">下班時間</th>
          <th style="min-width:60px">時數</th>
          <th style="min-width:320px">備註</th>
          <th style="min-width:70px">請假時數</th>
          <th style="min-width:80px">扣薪</th>
          <th style="min-width:60px">稽核</th>
          <th style="min-width:80px">稽核扣薪</th>
        </tr>
      </thead>
      <tbody>
        ${rows}
        <tr style="background:#fff9ee;font-weight:700">
          <td colspan="6" style="text-align:right">合計</td>
          <td class="num">${sumLeaveHr > 0 ? Math.round(sumLeaveHr * 100) / 100 : ''}</td>
          <td class="num neg">${sumDeduct > 0 ? '-' + sumDeduct.toLocaleString() : ''}</td>
          <td class="num">${sumAuditHr > 0 ? Math.round(sumAuditHr * 100) / 100 : ''}</td>
          <td class="num neg">${sumAuditDed > 0 ? '-' + sumAuditDed.toLocaleString() : ''}</td>
        </tr>
      </tbody>
    </table>
  `;
}

function renderDetail(name) {
  const emp = state.employees[name];
  const s = calcSalary(name);
  const leaveEntries = Object.entries(emp.stats.leaveHours).filter(([,h]) => h > 0);

  const isDefaultSalary = emp.salary === undefined;
  const isDefaultDays = emp.workDays === undefined;

  const breakdownRows = [];
  breakdownRows.push(`<div class="b-row"><div class="lbl">月薪(基準)</div><div class="val" style="color:#1a1a1a">+${s.monthly.toLocaleString()}</div></div>`);

  // V53 加給四項(+ 藍色)
  if (s.bonusUnusedLeave > 0) {
    breakdownRows.push(`<div class="b-row"><div class="lbl">(+) 未休獎金</div><div class="val" style="color:#1E5FBF">+${s.bonusUnusedLeave.toLocaleString()}</div></div>`);
  }
  if (s.bonusMakeupWage > 0) {
    breakdownRows.push(`<div class="b-row"><div class="lbl">(+) 調休工資</div><div class="val" style="color:#1E5FBF">+${s.bonusMakeupWage.toLocaleString()}</div></div>`);
  }
  if (s.bonusPositionAllowance > 0) {
    breakdownRows.push(`<div class="b-row"><div class="lbl">(+) 職務津貼</div><div class="val" style="color:#1E5FBF">+${s.bonusPositionAllowance.toLocaleString()}</div></div>`);
  }
  if (s.bonusOther > 0) {
    breakdownRows.push(`<div class="b-row"><div class="lbl">(+) 其他</div><div class="val" style="color:#1E5FBF">+${s.bonusOther.toLocaleString()}</div></div>`);
  }

  // V53 保額扣款三項(-)
  if (s.deductLabor > 0) {
    breakdownRows.push(`<div class="b-row"><div class="lbl">(−) 勞保</div><div class="val" style="color:#b85">−${s.deductLabor.toLocaleString()}</div></div>`);
  }
  if (s.deductHealth > 0) {

    breakdownRows.push(`<div class="b-row"><div class="lbl">(−) 家眷</div><div class="val" style="color:#b85">−${s.deductFamily.toLocaleString()}</div></div>`);
  }

  // 計算扣款四項(原)
  if (s.missedDays > 0) {
    const desc = s.isShift
      ? `漏打卡 ${s.missedDays} 天 × 日薪 ${s.dailyWage}(應出勤 ${s.expectedWorkDays} 天 = 本月 ${s.monthTotalDays} 天 − 月休 8 天,實際 ${emp.stats.punchedDays} 天)`
      : `漏打卡 ${s.missedDays} 天 × 日薪 ${s.dailyWage}(應出勤 ${s.expectedWorkDays} 天 = 本月非六日天數,實際 ${emp.stats.punchedDays} 天)`;
    breakdownRows.push(`<div class="b-row"><div class="lbl">${desc}</div><div class="val" style="color:#b85">−${s.missedDeduct.toLocaleString()}</div></div>`);
  }
  if (s.personalHrs > 0) {
    breakdownRows.push(`<div class="b-row"><div class="lbl">事假 ${s.personalHrs} 小時 × 時薪 ${s.hourlyWage}(全扣)</div><div class="val" style="color:#b85">−${s.personalDeduct.toLocaleString()}</div></div>`);
  }

  }
  if (s.auditHours > 0) {

  }

  const hasAnyAdjust = s.missedDays > 0 || s.personalHrs > 0 || s.sickHrs > 0 || s.auditHours > 0
    || s.extraDeduct > 0 || s.extraBonus > 0;
  if (!hasAnyAdjust) {
    breakdownRows.push(`<div class="b-row"><div class="lbl">無加給、無扣款項目</div><div class="val" style="color:#999">—</div></div>`);
  }

  const leavesHtml = leaveEntries.length === 0 ? '' : `
    <div class="section-h">請假彙整</div>
    <div class="leaves-grid">
      ${leaveEntries.map(([type, h]) => {
        const isDeduct = type === '事假' || type === '普通傷病假';
        return `
          <div class="leave-card ${isDeduct ? 'deduct' : ''}">
            <div class="lbl">${esc(type)}${isDeduct ? '<span class="flag">· 影響薪資</span>' : ''}</div>
            <div class="val">${h} <span class="u">小時</span></div>
          </div>
        `;
      }).join('')}
    </div>
  `;

  // 日期排序:record.date 已統一為 yyyy-mm-dd
  const sortedRecords = [...emp.records].sort((a, b) => {
    const ka = a.date || '', kb = b.date || '';
    if (ka === kb) return 0;
    const cmp = ka < kb ? -1 : 1;
    return state.recordSort === 'asc' ? cmp : -cmp;
  });
  const sortArrow = state.recordSort === 'asc' ? '↑' : '↓';
  const sortLabel = state.recordSort === 'asc' ? '日期升冪' : '日期降冪';

  const recordRows = sortedRecords.map(r => {
    const dstr = r.date || '';
    const inTime = r.punchIn || '—';
    const outTime = r.punchOut || '—';
    return `
      <div class="records-row">
        <div class="d">${esc(dstr)}</div>
        <div class="t ${inTime === '—' ? 'empty' : ''}">${esc(inTime)}</div>
        <div class="t ${outTime === '—' ? 'empty' : ''}">${esc(outTime)}</div>
        <div class="note ${!r.note ? 'empty' : ''}">${esc(r.note || '—')}</div>
      </div>
    `;
  }).join('');

  document.getElementById('detailPanel').innerHTML = `
    <div class="animate-in">
      <button class="back-btn" onclick="backToOverview()">${ICONS.close} 返回總覽</button>

      <div class="detail-head">
        <div>
          <div class="eyebrow-gold">Employee Detail</div>
          <h2 class="detail-name serif">${esc(emp.name)}</h2>
          <div class="detail-wtype">
            ${esc(emp.workType || '工時類型未標示')}
            <span style="color:#c9a961;margin-left:8px">· ${String(emp.stats.rule.startH).padStart(2,'0')}:${String(emp.stats.rule.startM).padStart(2,'0')}–${String(emp.stats.rule.endH).padStart(2,'0')}:${String(emp.stats.rule.endM).padStart(2,'0')}</span>
            <span style="color:#888;margin-left:6px">· ${emp.stats.rule.isShift ? '排休制' : '週休制'}</span>
          </div>
          ${emp.email ? `
          <div style="margin-top:8px;display:flex;align-items:center;gap:10px">
            <span style="font-size:11px;color:#888;font-family:'Noto Sans TC',sans-serif">Email</span>
            <span style="font-size:12px;color:#1a1a1a">${esc(emp.email)}</span>
            <button class="btn btn-outline" onclick="notifyEmployee('${esc(emp.name)}')" style="padding:4px 10px;font-size:11px">✉ 通知此員工</button>
          </div>
          ` : `
          <div style="margin-top:8px;font-size:11px;color:#bbb">(Email 未設定 — 匯入月薪時可一併匯入)</div>
          `}
        </div>
        <div style="text-align:right">
          <div style="font-family:'Noto Sans TC',sans-serif;font-size:10px;letter-spacing:2px;color:#888;text-transform:uppercase">實發薪資</div>
          <div class="detail-salary-big">${s.finalSalary.toLocaleString()}</div>
          <div style="font-family:'Noto Sans TC',sans-serif;font-size:11px;color:#888">TWD</div>
        </div>
      </div>

      <div class="section-h">薪資設定</div>
      <div class="config-fields">
        <div class="cf">
          <div class="row"><span>月薪</span>${isDefaultSalary ? `<span class="tiny">預設:${state.defaultSalary.toLocaleString()}</span>` : ''}</div>
          <div id="salary-display" class="display" onclick="startEditSalary()">
            <div class="v">${s.monthly.toLocaleString()}</div>
            <div class="u">TWD</div>
            <div class="edit-icon">${ICONS.edit}</div>
          </div>
        </div>
        <div class="cf">
          <div class="row"><span>當月應出勤天數</span>${isDefaultDays ? `<span class="tiny">預設:${state.defaultWorkDays}天</span>` : ''}</div>
          <div id="days-display" class="display" onclick="startEditDays()">
            <div class="v">${s.workDays}</div>
            <div class="u">天</div>
            <div class="edit-icon">${ICONS.edit}</div>
          </div>
        </div>
      </div>
      <div class="wage-info">
        <div>日薪:<span class="num" style="color:#1a1a1a;margin-left:6px">${s.dailyWage.toLocaleString()}</span> 元</div>
        <div>時薪:<span class="num" style="color:#1a1a1a;margin-left:6px">${s.hourlyWage.toLocaleString()}</span> 元</div>
      </div>

      <div style="height:32px"></div>
      <div class="section-h">薪資計算明細</div>
      <div class="breakdown">
        ${breakdownRows.join('')}
        <div class="b-total">
          <div class="lbl">實發薪資</div>
          <div class="val">${s.finalSalary.toLocaleString()} TWD</div>
        </div>
      </div>

      <div class="section-h">出勤統計</div>
      <div class="small-stats" style="grid-template-columns: repeat(6, 1fr)">
        <div class="sm"><div class="lbl">總記錄天數</div><div class="val">${emp.stats.totalDays}</div></div>
        <div class="sm"><div class="lbl">正常打卡天</div><div class="val">${emp.stats.punchedDays}</div></div>
        <div class="sm"><div class="lbl">應出勤</div><div class="val">${s.expectedWorkDays}</div></div>
        <div class="sm"><div class="lbl">漏打卡天數</div><div class="val" style="color:${s.missedDays > 0 ? '#d43' : '#1a1a1a'}">${s.missedDays}</div></div>
        <div class="sm"><div class="lbl">加班時數</div><div class="val" style="color:${s.otHours > 0 ? '#285' : '#1a1a1a'}">${s.otHours}</div></div>
        <div class="sm"><div class="lbl">加班補休時數</div><div class="val" style="color:${s.otCompHours > 0 ? '#285' : '#1a1a1a'}">${s.otCompHours}</div></div>
      </div>

      ${leavesHtml}

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="section-h" style="margin-bottom:0">逐日打卡紀錄</div>
        <button class="btn btn-outline" onclick="toggleRecordSort()" style="padding:6px 12px;font-size:11px">
          ${sortLabel} ${sortArrow}
        </button>
      </div>
      <div class="records-list">
        <div class="records-head">
          <div style="cursor:pointer" onclick="toggleRecordSort()" title="點擊切換排序">日期 ${sortArrow}</div><div>上班</div><div>下班</div><div>說明</div>
        </div>
        ${recordRows}
      </div>
    </div>
  `;
}

function startEditSalary() {
  const el = document.getElementById('salary-display');
  const current = state.employees[state.selectedEmp].salary ?? state.defaultSalary;
  el.outerHTML = `
    <div class="edit-row">
      <input type="number" id="salaryInput" value="${current}" autofocus>
      <button class="save" onclick="saveSalary()">${ICONS.check}</button>
      <button class="cancel" onclick="render()">${ICONS.close}</button>
    </div>
  `;
  const inp = document.getElementById('salaryInput');
  inp.focus(); inp.select();
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') saveSalary();
    if (e.key === 'Escape') render();
  });
}
function saveSalary() {
  const v = document.getElementById('salaryInput').value;
  updateSalary(state.selectedEmp, v);
}

function startEditDays() {
  const el = document.getElementById('days-display');
  const current = state.employees[state.selectedEmp].workDays ?? state.defaultWorkDays;
  el.outerHTML = `
    <div class="edit-row">
      <input type="number" id="daysInput" value="${current}" autofocus>
      <button class="save" onclick="saveDays()">${ICONS.check}</button>
      <button class="cancel" onclick="render()">${ICONS.close}</button>
    </div>
  `;
  const inp = document.getElementById('daysInput');
  inp.focus(); inp.select();
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') saveDays();
    if (e.key === 'Escape') render();
  });
}
function saveDays() {
  const v = document.getElementById('daysInput').value;
  updateWorkDays(state.selectedEmp, v);
}

function toggleRecordSort() {
  state.recordSort = state.recordSort === 'asc' ? 'desc' : 'asc';
  render();
}

// =============== Event wiring ===============
document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) parseFile(e.target.files[0]);
});

document.getElementById('salaryFileInput').addEventListener('change', e => {
  if (e.target.files[0]) {
    importSalary(e.target.files[0]);
    e.target.value = '';
  }
});

const dz = document.getElementById('dropzone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag');
  if (e.dataTransfer.files[0]) parseFile(e.dataTransfer.files[0]);
});
</script>
</body>
</html>
